    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            transition: all 0.2s;
            background-color: #f9fafb;
        }

        .input-field:focus {
            outline: none;
            border-color: #10b981;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background-color: #059669;
        }

        .btn-secondary {
            background-color: #3b82f6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #2563eb;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-ghost {
            background-color: transparent;
            color: #4b5563;
        }

        .btn-ghost:hover {
            background-color: #e5e7eb;
        }

        /* AIボタン */
        .btn-ai {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
        }

        .btn-ai:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transform: translateY(-1px);
        }

        .btn-ai:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }

            80%,
            100% {
                content: '';
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // APIキーはSupabaseから取得します
        const MANUAL_API_KEY = '';

        // --- Supabase 設定 ---
        const SUPABASE_URL = 'https://rowvbhhwbgllfczvqkzx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvd3ZiaGh3YmdsbGZjenZxa3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjgxNzksImV4cCI6MjA4NjI0NDE3OX0.kfIYof-B44s0M3nDHJ97oJVTucgV4EyJi8pyIvfvTMw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect, useMemo } = React;

        // --- アイコン (Lucide) ---
        const Icons = {
            Home: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
            Users: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>,
            FilePlus: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="12" y1="18" x2="12" y2="12" /><line x1="9" y1="15" x2="15" y2="15" /></svg>,
            Table: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="3" y1="15" x2="21" y2="15" /><line x1="12" y1="3" x2="12" y2="21" /></svg>,
            Sparkles: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /></svg>,
            Download: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
            Trash: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>,
            Settings: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.72l-.15.1a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></svg>,
            Calendar: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /><path d="M8 14l2 2 4-4" /></svg>,
            User: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>,
            LogOut: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
        };

        // --- ユーティリティ ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getFormattedDate = (date) => {
            if (!date) return '';
            const d = new Date(date);
            return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        };

        // --- 入室パスワード ---
        const ENTRY_PASSWORD = '202603191513';

        // --- パスワード入力ページ コンポーネント ---
        const LoginPage = ({ onLogin }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [shake, setShake] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === ENTRY_PASSWORD) {
                    sessionStorage.setItem('sw_authenticated', 'true');
                    onLogin();
                } else {
                    setError('パスワードが正しくありません');
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                }
            };

            const LogoIcon = () => (
                <svg className="w-16 h-16" viewBox="0 0 32 32" fill="none">
                    <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f472b6" /><stop offset="100%" stopColor="#a78bfa" /></linearGradient></defs>
                    <rect width="32" height="32" rx="8" fill="url(#lg)" />
                    <path d="M16 6L6 14h3v10h14V14h3L16 6z" fill="white" opacity="0.95" />
                    <rect x="12" y="18" width="8" height="6" rx="1" fill="#f9a8d4" />
                    <line x1="12" y1="14" x2="20" y2="14" stroke="#c084fc" strokeWidth="1.2" strokeLinecap="round" />
                    <line x1="13" y1="16.5" x2="19" y2="16.5" stroke="#c084fc" strokeWidth="1" strokeLinecap="round" />
                </svg>
            );

            return (
                <div className="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-indigo-50 flex items-center justify-center p-4">
                    <div className="w-full max-w-sm">
                        <div className="text-center mb-8">
                            <div className="flex justify-center mb-4"><LogoIcon /></div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">在宅書類自動作成</h1>
                            <p className="text-gray-400 mt-2 text-sm">🏠 在宅就労支援の書類作成を、もっとかんたんに。</p>
                        </div>

                        <div className={`glass p-8 rounded-2xl ${shake ? 'animate-bounce' : ''}`} style={shake ? {animation: 'shake 0.5s'} : {}}>
                            {error && <div className="bg-red-50 text-red-500 p-3 rounded-lg text-sm mb-4 text-center font-medium">{error}</div>}

                            <form onSubmit={handleSubmit}>
                                <div className="mb-2 text-center">
                                    <span className="text-4xl">🔒</span>
                                </div>
                                <h2 className="text-lg font-bold text-gray-700 mb-4 text-center">入室パスワード</h2>
                                <div className="mb-6">
                                    <input type="password" className="input-field text-center text-lg tracking-widest" value={password} onChange={e => setPassword(e.target.value)} placeholder="パスワードを入力" required autoFocus />
                                </div>
                                <button type="submit" className="w-full h-12 text-base font-bold rounded-xl text-white transition" style={{background: 'linear-gradient(135deg, #f472b6 0%, #a78bfa 100%)'}}>
                                    入室する
                                </button>
                            </form>
                        </div>
                        <p className="text-center text-xs text-gray-400 mt-6">© 2026 在宅書類自動作成</p>
                    </div>
                </div>
            );
        };

        // --- メインコンポーネント ---
        const App = () => {
            // パスワード認証状態
            const [authenticated, setAuthenticated] = useState(() => {
                return sessionStorage.getItem('sw_authenticated') === 'true';
            });

            const handleLogout = () => {
                sessionStorage.removeItem('sw_authenticated');
                setAuthenticated(false);
            };

            // 未認証 → パスワード入力ページ
            if (!authenticated) {
                return <LoginPage onLogin={() => setAuthenticated(true)} />;
            }

            // 認証済み → メインアプリ
            return <MainApp authUser={{}} onLogout={handleLogout} />;
        };

        // --- メインアプリ (ログイン後) ---
        const MainApp = ({ authUser, onLogout }) => {
            // State
            const [view, setView] = useState('input');
            const [users, setUsers] = useState([]);
            const [records, setRecords] = useState([]);
            const [supabaseStatus, setSupabaseStatus] = useState('connecting');

            // ふりがなのあいうえお順にソートした利用者リスト
            const sortedUsers = useMemo(() => [...users].sort((a, b) => (a.furigana || a.name).localeCompare(b.furigana || b.name, 'ja')), [users]);

            // APIキーの初期化
            const [apiKey, setApiKey] = useState(() => {
                if (MANUAL_API_KEY) return MANUAL_API_KEY;
                return localStorage.getItem('sw_api_key') || '';
            });

            // 入力フォームの状態
            const [formData, setFormData] = useState({
                userId: '',
                implementationDate: new Date().toISOString().split('T')[0],
                previousDate: '',
                periodStart: '',
                periodEnd: '',
                selectedMethod: 'commute',
                condition: '',
                workContent: '',
                goals: '',
                recorder: '',
                manager: '近藤恵子'
            });

            // 生成中のステータス管理
            const [loadingState, setLoadingState] = useState({
                condition: false,
                workContent: false,
                goals: false
            });

            // --- 月1達成度評価 State ---
            const now = new Date();
            const [monthlyFormData, setMonthlyFormData] = useState({
                userId: '',
                targetYear: now.getFullYear(),
                targetMonth: now.getMonth() + 1,
                implementationDate: now.toISOString().split('T')[0],
                timeStart: '10:00',
                timeEnd: '10:15',
                method: 'commute',
                methodOther: '',
                trainingGoal: '',
                activities: '',
                achievement: '',
                issues: '',
                improvementPlan: '',
                healthNotes: '',
                otherNotes: '',
                workValidity: '',
                evaluator: '近藤恵子',
                previousEvalDate: ''
            });
            const [monthlyLoading, setMonthlyLoading] = useState({});

            // --- 週評価 一括自動作成用 State ---
            const [autoCreatePopup, setAutoCreatePopup] = useState(null);
            // { targetDate: 'YYYY-MM-DD', targetUsers: [...], periodStart: '...', periodEnd: '...' }
            const [autoCreateLoading, setAutoCreateLoading] = useState(false);
            const [autoCreateTargetDate, setAutoCreateTargetDate] = useState(new Date().toISOString().split('T')[0]);
            const [autoCreateProgress, setAutoCreateProgress] = useState(''); // 進捗メッセージ

            // --- 保存済み月次評価データ ---
            const [savedMonthlyEvals, setSavedMonthlyEvals] = useState(() => {
                try {
                    const saved = localStorage.getItem('sw_monthly_evaluations');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            // localStorage バックアップ（月次評価）
            useEffect(() => { localStorage.setItem('sw_monthly_evaluations', JSON.stringify(savedMonthlyEvals)); }, [savedMonthlyEvals]);

            const [monthlyExcelFile, setMonthlyExcelFile] = useState(null);
            const [bulkCreating, setBulkCreating] = useState(false);

            // --- 全利用者の達成度評価を一括自動作成 ---
            const autoCreateAllMonthlyEvaluations = async () => {
                setBulkCreating(true);
                try {
                    const year = monthlyFormData.targetYear;
                    const month = monthlyFormData.targetMonth;
                    let currentKey = apiKey || MANUAL_API_KEY || localStorage.getItem('sw_api_key') || '';
                    let keySource = currentKey ? (apiKey ? 'state' : MANUAL_API_KEY ? 'manual' : 'localStorage') : 'none';

                    // Excelデータの読み込みとパース
                    let importedExcelData = null;
                    if (monthlyExcelFile) {
                        try {
                            const data = await monthlyExcelFile.arrayBuffer();
                            const workbook = window.XLSX.read(data, { type: 'array' });
                            const firstSheetName = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[firstSheetName];
                            importedExcelData = window.XLSX.utils.sheet_to_json(worksheet, { defval: '' });
                            console.log('インポートされたExcelデータ:', importedExcelData);
                        } catch (e) {
                            console.error('Excel読み込みエラー:', e);
                            alert('添付されたExcelファイルの読み込みに失敗しました。ファイルを確認してください。');
                            setBulkCreating(false);
                            return;
                        }
                    }

                    // APIキーがない場合、Supabaseから直接取得を試みる
                    if (!currentKey) {
                        try {
                            console.log('APIキーをSupabaseから取得中...');
                            const { data, error } = await supabase
                                .from('api_keys')
                                .select('value')
                                .eq('key', 'gemini_api_key')
                                .single();
                            if (!error && data && data.value) {
                                currentKey = data.value;
                                keySource = 'supabase';
                                setApiKey(data.value);
                                localStorage.setItem('sw_api_key', data.value);
                                console.log('APIキーをSupabaseから取得しました');
                            } else {
                                console.warn('Supabase APIキー取得失敗:', error);
                            }
                        } catch (e) {
                            console.error('APIキー取得失敗:', e);
                        }
                    }

                    console.log(`APIキー状態: currentKey=${currentKey ? '有(' + currentKey.substring(0, 8) + '...)' : '無'}, source=${keySource}`);

                    if (!currentKey) {
                        alert('⚠️ APIキーが設定されていません。AI自動生成ができないため、課題・改善方針等の欄は空白になります。\n\n設定画面でAPIキーを確認してください。');
                    }

                    // 対象月の週評価データがある利用者を取得
                    const usersWithRecords = users.filter(user => {
                        return records.some(r => {
                            if (r.userId !== user.id) return false;
                            const d = new Date(r.implementationDate);
                            return d.getFullYear() === year && (d.getMonth() + 1) === month;
                        });
                    });

                    if (usersWithRecords.length === 0) {
                        alert(`${year}年${month}月の週評価データを持つ利用者がいません。`);
                        return;
                    }

                    // 既存の評価との重複チェック
                    const alreadyCreated = usersWithRecords.filter(user =>
                        savedMonthlyEvals.some(e => e.userId === user.id && e.targetYear === year && e.targetMonth === month)
                    );

                    if (alreadyCreated.length > 0) {
                        const names = alreadyCreated.map(u => u.name).join('、');
                        if (!confirm(`以下の利用者は既に${month}月の達成度評価が作成済みです：\n${names}\n\n上書きしますか？`)) {
                            return;
                        }
                    }

                    let aiFailCount = 0;
                    let workingModelName = null;
                    let firstError = null;
                    const rateLimitedModels = new Set(); // レート制限に達したモデルを追跡

                    for (const user of usersWithRecords) {
                        // --- 実施日の決定ロジック ---
                        let computedImplDate = `${year}-${String(month).padStart(2, '0')}-15`; // デフォルトは15日
                        if (importedExcelData) {
                            // 空白を除去して比較
                            const normalizedUserName = (user.name || '').replace(/\s+/g, '');

                            const earlierRecords = updatedRecords

                                updatedRecords[i] = { ...rec, previousDate: correctPrevDate };
                                fixedRecords.push(updatedRecords[i]);

            // --- 記録保存 ---
            const saveRecord = async () => {

            // --- Excel出力（帳票様式） ---
            const thinBorder = { style: 'thin', color: { rgb: '000000' } };
            const allBorders = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
            const headerFont = { bold: true, sz: 10, name: 'ＭＳ Ｐゴシック' };

                const data = [

                    // 行1: 実施日
                    ['実施日', getFormattedDate(rec.implementationDate), '', '', '前回実施日', getFormattedDate(rec.previousDate), '', '', ''],
                    // 行2: 方法（上段）

                    // 行3: 方法（下段）

                    // 行4: 対象期間

                    // 行6-8: 体調について（3行分）

                const ws = XLSX.utils.aoa_to_sheet(data);

                // 列幅設定 (A~I列の9列)
                ws['!cols'] = [

                    { wch: 10 }, // B
                    { wch: 10 }, // C
                    { wch: 5 },  // D
                    { wch: 14 }, // E
                    { wch: 10 }, // F
                    { wch: 14 }, // G
                    { wch: 8 },  // H
                    { wch: 12 }, // I
                ];

                // 行高さ設定
                ws['!rows'] = [
                    { hpt: 30 },  // 行0: タイトル
                    { hpt: 22 },  // 行1: 実施日
                    { hpt: 20 },  // 行2: 方法上段
                    { hpt: 20 },  // 行3: 方法下段
                    { hpt: 22 },  // 行4: 対象期間
                    { hpt: 25 },  // 行5: モニタリング内容
                    { hpt: 30 },  // 行6: 体調
                    { hpt: 30 },  // 行7
                    { hpt: 30 },  // 行8
                    { hpt: 30 },  // 行9: 作業内容
                    { hpt: 30 },  // 行10
                    { hpt: 30 },  // 行11
                    { hpt: 30 },  // 行12: 今後の目標
                    { hpt: 30 },  // 行13
                    { hpt: 30 },  // 行14
                    { hpt: 25 },  // 行15: 記録者
                    { hpt: 18 },  // 行16: フッター
                ];

                // セル結合の定義
                ws['!merges'] = [
                    // 行0: タイトル
                    { s: { r: 0, c: 0 }, e: { r: 0, c: 1 } }, // 「評価 ※1」
                    { s: { r: 0, c: 4 }, e: { r: 0, c: 8 } }, // 注記
                    // 行1: 実施日
                    { s: { r: 1, c: 1 }, e: { r: 1, c: 3 } }, // 実施日の値
                    { s: { r: 1, c: 5 }, e: { r: 1, c: 8 } }, // 前回実施日の値
                    // 行2-3: 方法
                    { s: { r: 2, c: 0 }, e: { r: 3, c: 1 } }, // 「方法」ラベル
                    // 行4: 対象期間
                    { s: { r: 4, c: 1 }, e: { r: 4, c: 2 } }, // 開始日

                    // 行9-11: 作業内容
                    { s: { r: 9, c: 0 }, e: { r: 11, c: 1 } }, // ラベル

                // スタイル適用ヘルパー
                const setCell = (addr, style) => {

                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let r = range.s.r; r <= range.e.r; r++) {

                for (let c = 1; c <= 8; c++) {

                setCell('H17', { font: noteFont, alignment: { horizontal: 'right', vertical: 'center' }, border: {} });

                return ws;
            };

            // 帳票様式で1件出力
            const exportFormattedExcel = (rec) => {

            // 1ヶ月分帳票出力（1シートにまとめる）
            const FORM_ROWS = 17; // 1帳票あたりの行数（行0~16）
            const FORM_GAP = 1;   // 帳票間の空白行数

            // ワークブック生成ヘルパー（ファイル保存せずワークブックオブジェクトを返す）
            const generateMonthlyWorkbook = (userId, year, month) => {

                const monthRecords = records.filter(r => {

                }).sort((a, b) => new Date(a.implementationDate) - new Date(b.implementationDate));

                        ['今後の目標', '', rec.goals || '', '', '', '', '', '', ''],

            // 個別利用者のExcel出力（従来通り）
            const exportMonthlyFormattedExcel = (userId, year, month) => {
                const result = generateMonthlyWorkbook(userId, year, month);
                if (!result) {
                    const user = users.find(u => u.id === userId);
                    if (!user) { alert('利用者を選択してください'); return; }
                    alert(`${year}年${month}月の週評価データが見つかりません。`);
                    return;
                }
                XLSX.writeFile(result.wb, `${result.user.name}_${year}年${month}月_週評価帳票.xlsx`);
            };

            // 全利用者一括ZIPダウンロード
            const exportAllUsersMonthlyZip = async (year, month) => {
                const zip = new JSZip();
                let fileCount = 0;

                users.forEach(user => {
                    const result = generateMonthlyWorkbook(user.id, year, month);
                    if (result) {
                        const xlsxData = XLSX.write(result.wb, { bookType: 'xlsx', type: 'array' });
                        const fileName = `${result.user.name}_${year}年${month}月_週評価帳票.xlsx`;
                        zip.file(fileName, xlsxData);
                        fileCount++;
                    }
                });

                if (fileCount === 0) {
                    alert(`${year}年${month}月の週評価データを持つ利用者がいません。`);
                    return;
                }

                const blob = await zip.generateAsync({ type: 'blob' });
                saveAs(blob, `${year}年${month}月_全利用者_週評価帳票.zip`);
            };

            // 旧Excel出力（シンプル表形式を残す）
            const exportExcel = (targetRecords, fileName) => {
                if (targetRecords.length === 0) { alert('出力するデータがありません'); return; }
                const rows = targetRecords.map(rec => {
                    const user = users.find(u => u.id === rec.userId);
                    const methodMap = { commute: '通所', visit: '訪問', phone: '電話', line: 'LINE', discord: 'Discord', googleForm: 'Googleフォーム' };
                    const methods = rec.selectedMethod ? (methodMap[rec.selectedMethod] || rec.selectedMethod) : '';
                    return {
                        "氏名": user ? user.name : '不明',
                        "実施日": getFormattedDate(rec.implementationDate),
                        "前回実施日": getFormattedDate(rec.previousDate),
                        "対象期間開始": getFormattedDate(rec.periodStart),
                        "対象期間終了": getFormattedDate(rec.periodEnd),
                        "実施方法": methods,
                        "体調について": rec.condition,
                        "作業内容": rec.workContent,
                        "今後の目標": rec.goals,
                        "記録者": rec.recorder,
                        "確認者": rec.manager
                    };
                });
                const ws = XLSX.utils.json_to_sheet(rows);
                ws['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 40 }, { wch: 40 }, { wch: 40 }, { wch: 10 }, { wch: 10 }];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '週評価記録');
                XLSX.writeFile(wb, `${fileName}.xlsx`);
            };

            // --- 月1達成度評価: 週評価データから自動抽出 ---
            const autoPopulateMonthly = () => {
                if (!monthlyFormData.userId) { alert('利用者を選択してください'); return; }
                const year = monthlyFormData.targetYear;
                const month = monthlyFormData.targetMonth;
                const userRecords = records.filter(r => {
                    if (r.userId !== monthlyFormData.userId) return false;
                    const d = new Date(r.implementationDate);
                    return d.getFullYear() === year && (d.getMonth() + 1) === month;
                }).sort((a, b) => new Date(a.implementationDate) - new Date(b.implementationDate));

                if (userRecords.length === 0) {
                    alert(`${year}年${month}月の週評価データが見つかりません。`);
                    return;
                }

                const goalTexts = userRecords.map(r => r.goals).filter(Boolean);
                const workTexts = userRecords.map(r => r.workContent).filter(Boolean);
                const condTexts = userRecords.map(r => r.condition).filter(Boolean);

                setMonthlyFormData(prev => ({
                    ...prev,
                    trainingGoal: goalTexts.length > 0 ? goalTexts[goalTexts.length - 1] : '（データなし）',
                    activities: workTexts.length > 0 ? workTexts.join('\n') : '（データなし）',
                    achievement: condTexts.length > 0 ? condTexts.join('\n') : '（データなし）'
                }));
            };

            // --- 月1達成度評価: AI生成 ---
            const generateMonthlyContent = async (targetField) => {
                const currentKey = apiKey || MANUAL_API_KEY;
                if (!currentKey) { alert('APIキーが設定されていません。管理者に連絡してください。'); return; }

                const currentText = monthlyFormData[targetField];
                if (!currentText) { alert('キーワードを入力してからボタンを押してください。'); return; }

                setMonthlyLoading(prev => ({ ...prev, [targetField]: true }));

                const user = users.find(u => u.id === monthlyFormData.userId);
                const userName = user ? user.name : '利用者';

                const instructions = {
                    issues: `入力されたキーワードを元に、在宅就労の「課題」を2〜3文で作成してください。利用者${userName}さんの就労達成度評価における課題として適切な内容にしてください。`,
                    improvementPlan: `入力されたキーワードを元に、「今後における課題の改善の方針」を2〜3文で作成してください。利用者${userName}さんの在宅就労における課題改善の方針として、具体的な支援方法を含めてください。`,
                    healthNotes: `入力されたキーワードを元に、「健康・体調面での留意事項」を2〜3文で作成してください。在宅就労における健康管理の観点から、連絡方法や体調確認の方法を含めてください。`,
                    otherNotes: `入力されたキーワードを元に、「その他特記事項」を1〜2文で簡潔に作成してください。`,
                    workValidity: `入力されたキーワードを元に、「在宅就労時の妥当性」を2〜3文で作成してください。利用者${userName}さんが在宅で就労を継続することの妥当性について、作業報告の状況や自宅環境の観点から評価してください。`
                };

                const prompt = `
                    あなたは障害福祉サービスの就労継続支援B型の支援員です。
                    在宅における就労達成度評価シートの記入を行っています。
                    
                    【指示】
                    ${instructions[targetField]}
                    福祉支援記録として適切な「です・ます」調の文章にしてください。
                    出力はプレーンテキストのみ。
                `;

                try {
                    const text = await generateGeminiContent(prompt, currentText, currentKey, (status) => console.log(status));
                    if (text) {
                        setMonthlyFormData(prev => ({ ...prev, [targetField]: text.trim() }));
                    }
                } catch (e) {
                    console.error("AI Generation Error:", e);
                    alert(`AI生成エラー: ${e.message}`);
                } finally {
                    setMonthlyLoading(prev => ({ ...prev, [targetField]: false }));
                }
            };

            // --- 月1達成度評価: Excel出力（帳票様式） ---
            const createMonthlyFormSheet = (d, user) => {
                // スタイル定義（週評価と共通化）
                const thinBorder = { style: 'thin', color: { rgb: '000000' } };
                const allBorders = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
                const headerFont = { bold: true, sz: 10, name: 'ＭＳ Ｐゴシック' };
                const bodyFont = { sz: 10, name: 'ＭＳ Ｐゴシック' };
                const titleFont = { bold: true, sz: 18, name: 'ＭＳ Ｐゴシック' };
                const noteFont = { sz: 8, name: 'ＭＳ Ｐゴシック' };
                const centerAlign = { horizontal: 'center', vertical: 'center', wrapText: true };
                const leftAlign = { horizontal: 'left', vertical: 'center', wrapText: true };
                const topLeftAlign = { horizontal: 'left', vertical: 'top', wrapText: true };

                const methodMap = { commute: '通所', visit: '訪問', other: 'その他' };
                const methodStr = d.method === 'other' ? `${d.methodOther}` : (methodMap[d.method] || d.method);

                // 実施方法のチェックボックス表現
                const getCheck = (key) => d.method === key ? '☑' : '□';

                // 行の高さ計算ヘルパー (1行あたり全角35文字と仮定)
                const BASE_ROW_HEIGHT = 30; // 標準の高さ
                const CHARS_PER_LINE = 35;
                const calcRowHeight = (text) => {
                    if (!text) return BASE_ROW_HEIGHT * 3; // 空の場合は3行分の高さ確保（デフォルト）
                    const lines = text.split('\n');
                    let totalLines = 0;
                    lines.forEach(line => {
                        totalLines += Math.max(1, Math.ceil(line.length / CHARS_PER_LINE));
                    });
                    // 最低3行分は確保、それ以上なら行数×文字の高さ(約18pt)
                    return Math.max(BASE_ROW_HEIGHT * 3, totalLines * 18);
                };

                // 各項目の高さを計算
                const h_goal = calcRowHeight(d.trainingGoal);
                const h_act = calcRowHeight(d.activities);
                const h_ach = calcRowHeight(d.achievement);
                const h_iss = calcRowHeight(d.issues);
                const h_imp = calcRowHeight(d.improvementPlan);
                const h_hlt = calcRowHeight(d.healthNotes); // 2行枠
                const h_oth = calcRowHeight(d.otherNotes); // 2行枠
                const h_val = calcRowHeight(d.workValidity); // 2行枠

                const data = [
                    // 行0: タイトル
                    ['在宅における就労達成度評価シート', '', '', '', '', '', `令和${d.targetYear - 2018}年${d.targetMonth}月分`, '', ''],
                    // 行1: 対象者情報
                    ['対象者名', user.name, '', '', '', '受給\n者証', user.number || '', '', ''],
                    // 行2: 実施日
                    ['実施日', `${d.targetYear}年${d.targetMonth}月${new Date(d.implementationDate).getDate()}日`, '', '', '実施時間', `${d.timeStart} ～ ${d.timeEnd}`, '', '', ''],
                    // 行3: 実施方法ヘッダー
                    ['実施方法', getCheck('line'), 'LINE', getCheck('discord'), 'Discord', getCheck('googleForm'), 'Googleフォーム', getCheck('phone'), '電話'],
                    // 行4: 実施方法データ
                    ['', getCheck('visit'), '訪問', getCheck('commute'), '通所', getCheck('other'), 'その他', '', ''],
                    // 行5-7: 訓練目標
                    ['訓練目標', d.trainingGoal || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行8-10: 取組内容
                    ['取組内容', d.activities || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行11-13: 達成度
                    ['訓練目標に対する達成度', d.achievement || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行14-16: 課題
                    ['課題', d.issues || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行17-19: 改善方針
                    ['今後における課題の改善方針', d.improvementPlan || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行20-21: 健康面
                    ['健康・体調面での留意事項', d.healthNotes || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行22-23: その他
                    ['その他特記事項', d.otherNotes || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行24-25: 妥当性
                    ['在宅就労継続の妥当性', d.workValidity || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行26: 評価実施者
                    (() => {
                        // 前回の達成度評価日を令和形式で表示
                        const prevDate = d.previousEvalDate ? new Date(d.previousEvalDate) : null;
                        const prevYear = prevDate ? `${prevDate.getFullYear() - 2018}年` : '';
                        const prevMonth = prevDate ? `${prevDate.getMonth() + 1}月` : '';
                        const prevDay = prevDate ? `${prevDate.getDate()}日` : '';
                        return ['評価実施者', d.evaluator || '', '', '前回の達成度評価日', '', '令和', prevYear, prevMonth, prevDay];
                    })(),
                    // 行27: 確認文
                    ['上記内容を確認し、評価実施者と共有しました。', '', '', '', '', '', '', '', ''],
                    // 行28: 対象者署名欄
                    ['', '', '', '対象者署名', '', '', '', '', '']
                ];

                const ws = XLSX.utils.aoa_to_sheet(data);

                // 行の高さ設定 (動的計算結果を適用)
                // 3行結合の項目は、合計高さを3で割る
                // 2行結合の項目は、合計高さを2で割る
                ws['!rows'] = [];
                ws['!rows'][0] = { hpt: 30 }; // タイトル
                ws['!rows'][1] = { hpt: 25 }; // 対象者
                ws['!rows'][2] = { hpt: 25 }; // 実施日
                ws['!rows'][3] = { hpt: 20 }; // 方法1
                ws['!rows'][4] = { hpt: 20 }; // 方法2

                // 訓練目標 (3行)
                const h_goal_per_row = h_goal / 3;
                [5, 6, 7].forEach(r => ws['!rows'][r] = { hpt: h_goal_per_row });

                // 取組内容 (3行)
                const h_act_per_row = h_act / 3;
                [8, 9, 10].forEach(r => ws['!rows'][r] = { hpt: h_act_per_row });

                // 達成度 (3行)
                const h_ach_per_row = h_ach / 3;
                [11, 12, 13].forEach(r => ws['!rows'][r] = { hpt: h_ach_per_row });

                // 課題 (3行)
                const h_iss_per_row = h_iss / 3;
                [14, 15, 16].forEach(r => ws['!rows'][r] = { hpt: h_iss_per_row });

                // 改善方針 (3行)
                const h_imp_per_row = h_imp / 3;
                [17, 18, 19].forEach(r => ws['!rows'][r] = { hpt: h_imp_per_row });

                // 健康面 (2行)
                const h_hlt_per_row = Math.max(BASE_ROW_HEIGHT, h_hlt / 2); // 最低でもBASE確保
                [20, 21].forEach(r => ws['!rows'][r] = { hpt: h_hlt_per_row });

                // その他 (2行)
                const h_oth_per_row = Math.max(BASE_ROW_HEIGHT, h_oth / 2);
                [22, 23].forEach(r => ws['!rows'][r] = { hpt: h_oth_per_row });

                // 妥当性 (2行)
                const h_val_per_row = Math.max(BASE_ROW_HEIGHT, h_val / 2);
                [24, 25].forEach(r => ws['!rows'][r] = { hpt: h_val_per_row });

                ws['!rows'][26] = { hpt: 25 }; // 実施者
                ws['!rows'][27] = { hpt: 30 }; // 確認文
                ws['!rows'][28] = { hpt: 35 }; // 対象者署名欄

                // 列幅設定
                ws['!cols'] = [
                    { wch: 18 }, // A: ラベル
                    { wch: 5 },  // B: チェック
                    { wch: 14 }, // C: 項目名
                    { wch: 5 },  // D: チェック
                    { wch: 14 }, // E: 項目名
                    { wch: 5 },  // F: チェック
                    { wch: 14 }, // G: 項目名
                    { wch: 5 },  // H: チェック
                    { wch: 12 }, // I: 項目名
                ];

                // セル結合
                ws['!merges'] = [
                    // タイトル
                    { s: { r: 0, c: 0 }, e: { r: 0, c: 5 } },
                    { s: { r: 0, c: 6 }, e: { r: 0, c: 8 } },
                    // 対象者名
                    { s: { r: 1, c: 1 }, e: { r: 1, c: 4 } },
                    { s: { r: 1, c: 6 }, e: { r: 1, c: 8 } },
                    // 実施日
                    { s: { r: 2, c: 1 }, e: { r: 2, c: 3 } },
                    { s: { r: 2, c: 5 }, e: { r: 2, c: 8 } }, // 時間
                    // 方法
                    { s: { r: 3, c: 0 }, e: { r: 4, c: 0 } }, // ラベル
                    // 各項目のラベル列（A列）の結合
                    { s: { r: 5, c: 0 }, e: { r: 7, c: 0 } },   // 訓練目標
                    { s: { r: 8, c: 0 }, e: { r: 10, c: 0 } },  // 取組内容
                    { s: { r: 11, c: 0 }, e: { r: 13, c: 0 } }, // 達成度
                    { s: { r: 14, c: 0 }, e: { r: 16, c: 0 } }, // 課題
                    { s: { r: 17, c: 0 }, e: { r: 19, c: 0 } }, // 改善方針
                    { s: { r: 20, c: 0 }, e: { r: 21, c: 0 } }, // 健康面
                    { s: { r: 22, c: 0 }, e: { r: 23, c: 0 } }, // その他
                    { s: { r: 24, c: 0 }, e: { r: 25, c: 0 } }, // 妥当性
                    // 各項目の内容列（B-I列）の結合
                    { s: { r: 5, c: 1 }, e: { r: 7, c: 8 } }, // 訓練目標
                    { s: { r: 8, c: 1 }, e: { r: 10, c: 8 } }, // 取組内容
                    { s: { r: 11, c: 1 }, e: { r: 13, c: 8 } }, // 達成度
                    { s: { r: 14, c: 1 }, e: { r: 16, c: 8 } }, // 課題
                    { s: { r: 17, c: 1 }, e: { r: 19, c: 8 } }, // 改善方針
                    { s: { r: 20, c: 1 }, e: { r: 21, c: 8 } }, // 健康面
                    { s: { r: 22, c: 1 }, e: { r: 23, c: 8 } }, // その他
                    { s: { r: 24, c: 1 }, e: { r: 25, c: 8 } }, // 妥当性
                    // 評価実施者
                    { s: { r: 26, c: 1 }, e: { r: 26, c: 2 } }, // 名前 B-C
                    { s: { r: 26, c: 3 }, e: { r: 26, c: 4 } }, // 前回の達成度評価日ラベル D-E
                    // 確認文
                    { s: { r: 27, c: 0 }, e: { r: 27, c: 8 } },
                    // 対象者署名欄
                    { s: { r: 28, c: 3 }, e: { r: 28, c: 4 } }, // 対象者署名ラベル
                    { s: { r: 28, c: 5 }, e: { r: 28, c: 8 } }, // 署名記入欄
                ];

                // スタイル適用
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let r = range.s.r; r <= range.e.r; r++) {
                    for (let c = range.s.c; c <= range.e.c; c++) {
                        const addr = XLSX.utils.encode_cell({ r, c });
                        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
                        ws[addr].s = { font: bodyFont, border: allBorders, alignment: centerAlign };
                    }
                }

                // 個別スタイル上書き
                // タイトル
                const setStyle = (r, c, s) => { const addr = XLSX.utils.encode_cell({ r, c }); if (ws[addr]) ws[addr].s = { ...ws[addr].s, ...s }; };

                // タイトル行
                setStyle(0, 0, { font: titleFont, border: { bottom: thinBorder } });
                // 令和X年X月分 → 真ん中に配置
                setStyle(0, 6, { font: { sz: 11, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center' }, border: { bottom: thinBorder } });

                // 受給者証ラベル → 小さいフォント
                setStyle(1, 5, { font: { sz: 7, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: allBorders });
                // 受給者証番号 → 少し大きめのフォント
                setStyle(1, 6, { font: { sz: 10, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });

                // 実施時間 → 真ん中に配置
                setStyle(2, 5, { font: bodyFont, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });

                // ヘッダー項目
                [5, 8, 11, 14, 17, 20, 22, 24].forEach(r => {
                    setStyle(r, 0, { font: headerFont, alignment: centerAlign, fill: { fgColor: { rgb: "FFFFFF" } } });
                });

                // 左寄せ・縦中央にするセル（テキストが入る部分）
                [5, 8, 11, 14, 17, 20, 22, 24].forEach(r => {
                    setStyle(r, 1, { font: bodyFont, alignment: leftAlign, wrapText: true });
                });

                // チェックボックスのフォントサイズ調整
                for (let r = 3; r <= 4; r++) {
                    for (let c = 1; c <= 7; c += 2) {
                        const addr = XLSX.utils.encode_cell({ r, c });
                        if (ws[addr]) ws[addr].s = { ...ws[addr].s, font: { sz: 12, name: 'ＭＳ Ｐゴシック' }, alignment: centerAlign };
                    }
                }

                // 行26: 評価実施者行のスタイル
                setStyle(26, 0, { font: headerFont, alignment: centerAlign, border: allBorders });
                setStyle(26, 1, { font: bodyFont, alignment: centerAlign, border: allBorders });
                setStyle(26, 3, { font: { sz: 9, name: 'ＭＳ Ｐゴシック' }, alignment: centerAlign, border: allBorders });
                // 令和X年X月X日 の各セル
                for (let c = 5; c <= 8; c++) {
                    setStyle(26, c, { font: bodyFont, alignment: centerAlign, border: allBorders });
                }

                // 行27: 確認文（大きめのフォント、枠線付き）
                setStyle(27, 0, { font: { bold: true, sz: 12, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });

                // 行28: 対象者署名欄
                for (let c = 0; c <= 2; c++) setStyle(28, c, { border: {} }); // A-Cは空白・枠なし
                setStyle(28, 3, { font: bodyFont, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });
                setStyle(28, 5, { font: bodyFont, alignment: centerAlign, border: allBorders });

                return ws;
            };

            const exportMonthlyExcel = () => {
                const user = users.find(u => u.id === monthlyFormData.userId);
                if (!user) { alert('利用者を選択してください'); return; }

                const ws = createMonthlyFormSheet(monthlyFormData, user);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '達成度評価');
                const fileName = `${user.name}_${monthlyFormData.targetYear}年${monthlyFormData.targetMonth}月_達成度評価.xlsx`;
                XLSX.writeFile(wb, fileName);
            };

            return (

                                    <p className="text-sm text-gray-500 mb-4">
                                        選択中の対象年月（{monthlyFormData.targetYear}年{monthlyFormData.targetMonth}月）について、
                                        週評価データが存在する全利用者の達成度評価を一括で自動作成します。<br/>
                                        ※実績のExcelファイル（任意）を添付すると、各利用者の「施設外就労かつ15日以降」の日付を自動で「実施日」に設定します。添付がない場合はデフォルトで15日になります。
                                    </p>
                                    
                                    <div className="mb-4">
                                        <label className="block text-sm font-bold text-gray-600 mb-1">作業時間エクセルデータ (任意)</label>
                                        <input 
                                            type="file" 
                                            accept=".xlsx, .xls"
                                            onChange={(e) => setMonthlyExcelFile(e.target.files[0] || null)}
                                            className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100"
                                        />
                                    </div>

                                    <button
                                        onClick={autoCreateAllMonthlyEvaluations}
                                        disabled={bulkCreating}
                                        className={`btn px-8 py-3 shadow-lg transform hover:-translate-y-1 transition text-base font-bold ${bulkCreating ? 'bg-gray-400 cursor-not-allowed' : 'bg-amber-500 text-white hover:bg-amber-600'}`}
                                    >
                                        {bulkCreating ? <span className="loading-dots">📝 AI生成中…お待ちください</span> : '🚀 全利用者の達成度評価を自動作成'}
                                    </button>
                                </div>

                                {/* --- 作成済み達成度評価の一覧 --- */}
                                {(() => {
                                    const filteredEvals = savedMonthlyEvals
                                        .filter(e => e.targetYear === monthlyFormData.targetYear && e.targetMonth === monthlyFormData.targetMonth)
                                        .sort((a, b) => {
                                            const userA = users.find(u => u.id === a.userId);
                                            const userB = users.find(u => u.id === b.userId);
                                            return ((userA?.furigana || userA?.name) || '').localeCompare((userB?.furigana || userB?.name) || '', 'ja');
                                        });

                                    return filteredEvals.length > 0 && (
                                        <div className="glass p-6 rounded-xl border-l-4 border-green-500">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="font-bold text-green-700 flex items-center gap-2">
                                                    📋 作成済み達成度評価（{monthlyFormData.targetYear}年{monthlyFormData.targetMonth}月） — {filteredEvals.length}件
                                                </h3>
                                                <div className="flex gap-2">
                                                    <button
                                                        onClick={() => printAllMonthlyEvals(filteredEvals)}
                                                        className="btn px-4 py-2 text-sm font-bold text-white shadow" style={{background: 'linear-gradient(135deg, #6366f1, #8b5cf6)'}}
                                                    >
                                                        🖨️ 一括印刷
                                                    </button>
                                                    <button
                                                        onClick={() => {
                                                            filteredEvals.forEach(evalData => exportSavedMonthlyExcel(evalData));
                                                        }}
                                                        className="btn btn-primary px-4 py-2 text-sm"
                                                    >
                                                        <Icons.Download /> 全件ダウンロード
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="overflow-hidden rounded-lg border border-gray-200">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-gray-50 border-b text-sm text-gray-500">
                                                            <th className="p-3">対象者名</th>
                                                            <th className="p-3">実施日</th>
                                                            <th className="p-3">訓練目標</th>
                                                            <th className="p-3">作成日時</th>
                                                            <th className="p-3 text-right">操作</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {filteredEvals.map(evalData => {
                                                            const user = users.find(u => u.id === evalData.userId);
                                                            return (
                                                                <tr key={evalData.id} className="border-b hover:bg-gray-50 transition">
                                                                    <td className="p-3 font-bold">{user ? user.name : '削除済ユーザー'}</td>
                                                                    <td className="p-3 text-sm">{evalData.implementationDate}</td>
                                                                    <td className="p-3 text-sm text-gray-600 max-w-xs truncate">{evalData.trainingGoal?.substring(0, 40)}{evalData.trainingGoal?.length > 40 ? '...' : ''}</td>
                                                                    <td className="p-3 text-xs text-gray-400">{evalData.createdAt ? new Date(evalData.createdAt).toLocaleString('ja-JP') : ''}</td>
                                                                    <td className="p-3 text-right flex justify-end gap-2">
                                                                        <button
                                                                            onClick={() => printAllMonthlyEvals([evalData])}
                                                                            className="text-indigo-600 hover:underline text-sm font-bold"
                                                                        >
                                                                            🖨️ 印刷
                                                                        </button>
                                                                        <button
                                                                            onClick={() => exportSavedMonthlyExcel(evalData)}
                                                                            className="text-green-600 hover:underline text-sm font-bold"
                                                                        >
                                                                            📥 Excel
                                                                        </button>
                                                                        <button
                                                                            onClick={() => deleteMonthlyEval(evalData.id)}
                                                                            className="text-red-500 hover:underline text-sm"
                                                                        >
                                                                            削除
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                            <p className="text-xs text-gray-400 mt-3">※ 各行の「🖨️ 印刷」で個別印刷、「📥 Excel」で個別ダウンロード、右上の「🖨️ 一括印刷」で全員分をまとめて印刷できます。</p>
                                        </div>
                                    );
                                })()}

                            </div>
                        )}


                    </main>
                </div>
            );
        };

        // サブコンポーネント: 利用者行（編集対応）
        const UserRow = ({ user, onSave, onDelete }) => {
            const [editing, setEditing] = useState(false);
            const [editName, setEditName] = useState(user.name);
            const [editFurigana, setEditFurigana] = useState(user.furigana || '');
            const [editNumber, setEditNumber] = useState(user.number || '');

            const handleSave = () => {
                if (!editName) { alert('氏名を入力してください'); return; }
                onSave({ ...user, name: editName, furigana: editFurigana, number: editNumber });
                setEditing(false);
            };

            const handleCancel = () => {
                setEditName(user.name);
                setEditFurigana(user.furigana || '');
                setEditNumber(user.number || '');
                setEditing(false);
            };

            if (editing) {
                return (
                    <div className="p-4 bg-blue-50 rounded border-2 border-blue-300 space-y-3">
                        <div className="flex gap-3 flex-wrap">
                            <div className="flex-1 min-w-[120px]">
                                <label className="block text-xs font-bold text-gray-500 mb-1">氏名</label>
                                <input className="input-field" value={editName} onChange={e => setEditName(e.target.value)} />
                            </div>
                            <div className="flex-1 min-w-[120px]">
                                <label className="block text-xs font-bold text-gray-500 mb-1">ふりがな</label>
                                <input className="input-field" value={editFurigana} onChange={e => setEditFurigana(e.target.value)} />
                            </div>
                            <div className="flex-1 min-w-[120px]">
                                <label className="block text-xs font-bold text-gray-500 mb-1">受給者証番号</label>
                                <input className="input-field" value={editNumber} onChange={e => setEditNumber(e.target.value)} />
                            </div>
                        </div>
                        <div className="flex gap-2 justify-end">
                            <button onClick={handleCancel} className="btn btn-ghost text-gray-500 text-sm">キャンセル</button>
                            <button onClick={handleSave} className="btn btn-primary text-sm px-4">保存</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-between items-center p-3 bg-white rounded border hover:shadow-sm transition">
                    <div>
                        <div className="font-bold text-lg">{user.name} {user.furigana && <span className="text-sm text-gray-400 ml-2">({user.furigana})</span>}</div>
                        <div className="text-sm text-gray-500">{user.number}</div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setEditing(true)} className="btn btn-ghost text-blue-500" title="編集">
                            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
                        </button>
                        <button onClick={onDelete} className="btn btn-ghost text-red-500" title="削除">
                            <Icons.Trash />
                        </button>
                    </div>
                </div>
            );
        };

        // サブコンポーネント: 利用者追加フォーム
        const AddUserForm = ({ onAdd }) => {
            const [name, setName] = useState('');
            const [furigana, setFurigana] = useState('');
            const [number, setNumber] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name) return;
                if (!furigana) { alert('ふりがなを入力してください'); return; }
                onAdd({ name, furigana, number });
                setName('');
                setFurigana('');
                setNumber('');
            };

            return (
                <form onSubmit={handleSubmit} className="flex gap-4 items-end flex-wrap">
                    <div className="flex-1 min-w-[140px]">
                        <label className="block text-sm font-bold text-gray-600 mb-1">氏名</label>
                        <input className="input-field" value={name} onChange={e => setName(e.target.value)} placeholder="例：山田 太郎" />
                    </div>
                    <div className="flex-1 min-w-[140px]">
                        <label className="block text-sm font-bold text-gray-600 mb-1">ふりがな</label>
                        <input className="input-field" value={furigana} onChange={e => setFurigana(e.target.value)} placeholder="例：やまだ たろう" />
                    </div>
                    <div className="flex-1 min-w-[140px]">
                        <label className="block text-sm font-bold text-gray-600 mb-1">受給者証番号</label>
                        <input className="input-field" value={number} onChange={e => setNumber(e.target.value)} placeholder="例：0000123456" />
                    </div>
                    <button type="submit" className="btn btn-primary h-11 px-6">追加</button>
                </form>
            );
        };

        // サブコンポーネント: 1ヶ月分帳票出力パネル
        const MonthlyExportPanel = ({ sortedUsers, onExport, onBulkExport }) => {
            const now = new Date();
            const [expUserId, setExpUserId] = useState('');
            const [expYear, setExpYear] = useState(now.getFullYear());
            const [expMonth, setExpMonth] = useState(now.getMonth() + 1);
            const [bulkLoading, setBulkLoading] = useState(false);

            const handleBulkExport = async () => {
                setBulkLoading(true);
                try {
                    await onBulkExport(expYear, expMonth);
                } finally {
                    setBulkLoading(false);
                }
            };

            return (
                <div className="glass p-6 rounded-xl border-l-4 border-green-500">
                    <h3 className="font-bold text-green-700 mb-4 flex items-center gap-2">
                        📋 1ヶ月分の帳票様式Excel出力
                    </h3>
                    <div className="flex gap-4 items-end flex-wrap">
                        <div className="flex-1 min-w-[160px]">
                            <label className="block text-sm font-bold text-gray-600 mb-1">利用者</label>
                            <select className="input-field" value={expUserId} onChange={e => setExpUserId(e.target.value)}>
                                <option value="">選択してください</option>
                                {sortedUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                            </select>
                        </div>
                        <div className="flex items-end gap-1">
                            <select className="input-field" value={expYear} onChange={e => setExpYear(Number(e.target.value))}>
                                {[2024, 2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}年</option>)}
                            </select>
                        </div>
                        <div className="flex items-end gap-1">
                            <select className="input-field" value={expMonth} onChange={e => setExpMonth(Number(e.target.value))}>
                                {[...Array(12)].map((_, i) => <option key={i + 1} value={i + 1}>{i + 1}月</option>)}
                            </select>
                        </div>
                        <button
                            onClick={() => { if (!expUserId) { alert('利用者を選択してください'); return; } onExport(expUserId, expYear, expMonth); }}
                            className="btn btn-primary h-11 px-6 shadow-lg transform hover:-translate-y-1"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                            帳票様式で出力
                        </button>
                    </div>
                    <div style={{ borderTop: '1px dashed #d1d5db', marginTop: '1rem', paddingTop: '1rem' }}>
                        <div className="flex gap-4 items-center flex-wrap">
                            <div style={{ flex: 1 }}>
                                <p className="text-sm text-gray-600 font-bold">📦 全利用者一括ダウンロード</p>
                                <p className="text-xs text-gray-400">上で選択した年月の全利用者データをZIPでまとめてダウンロードします。</p>
                            </div>
                            <button
                                onClick={handleBulkExport}
                                disabled={bulkLoading}
                                className="btn h-11 px-6 shadow-lg transform hover:-translate-y-1"
                                style={{ background: bulkLoading ? '#cbd5e1' : 'linear-gradient(135deg, #f59e0b, #d97706)', color: 'white', border: 'none', cursor: bulkLoading ? 'not-allowed' : 'pointer', fontWeight: 700 }}
                            >
                                {bulkLoading ? (
                                    <span>⏳ 作成中...</span>
                                ) : (
                                    <><svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg> 一括ZIP出力</>
                                )}
                            </button>
                        </div>
                    </div>
                    <p className="text-xs text-gray-400 mt-3">※ 選択した利用者・月に該当する週評価を帳票様式（画像と同じフォーマット）でExcel出力します。各週が1シートにまとめられます。</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
