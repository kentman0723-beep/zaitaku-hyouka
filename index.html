<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書類作成支援</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234f8cff'/%3E%3Cstop offset='100%25' stop-color='%233b6fd9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Crect x='8' y='5' width='16' height='21' rx='2' fill='white' opacity='0.95'/%3E%3Cline x1='12' y1='11' x2='20' y2='11' stroke='%234f8cff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='12' y1='15' x2='20' y2='15' stroke='%234f8cff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='12' y1='19' x2='17' y2='19' stroke='%234f8cff' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M21 22l3-3-1.5-1.5L19 21v1.5H20.5L21 22z' fill='%23f59e0b'/%3E%3C/svg%3E" />

    <!-- スタイル・ライブラリ読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Excel出力用ライブラリ (xlsx-js-style: スタイル対応版) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">


    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>

    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            transition: all 0.2s;
            background-color: #f9fafb;
        }

        .input-field:focus {
            outline: none;
            border-color: #10b981;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background-color: #059669;
        }

        .btn-secondary {
            background-color: #3b82f6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #2563eb;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        .btn-ghost {
            background-color: transparent;
            color: #4b5563;
        }

        .btn-ghost:hover {
            background-color: #e5e7eb;
        }

        /* AIボタン */
        .btn-ai {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
        }

        .btn-ai:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transform: translateY(-1px);
        }

        .btn-ai:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }

            80%,
            100% {
                content: '';
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // APIキーはSupabaseから取得します
        const MANUAL_API_KEY = '';

        // --- Supabase 設定 ---
        const SUPABASE_URL = 'https://rowvbhhwbgllfczvqkzx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvd3ZiaGh3YmdsbGZjenZxa3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NjgxNzksImV4cCI6MjA4NjI0NDE3OX0.kfIYof-B44s0M3nDHJ97oJVTucgV4EyJi8pyIvfvTMw';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { useState, useEffect, useMemo } = React;

        // --- アイコン (Lucide) ---
        const Icons = {
            Home: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
            Users: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>,
            FilePlus: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="12" y1="18" x2="12" y2="12" /><line x1="9" y1="15" x2="15" y2="15" /></svg>,
            Table: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="3" y1="15" x2="21" y2="15" /><line x1="12" y1="3" x2="12" y2="21" /></svg>,
            Sparkles: () => <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /></svg>,
            Download: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>,
            Trash: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>,
            Settings: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.72l-.15.1a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></svg>,
            Calendar: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /><path d="M8 14l2 2 4-4" /></svg>,
            User: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>,
            LogOut: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
        };

        // --- ユーティリティ ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getFormattedDate = (date) => {
            if (!date) return '';
            const d = new Date(date);
            return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
        };

        // --- ログインページ コンポーネント ---
        const LoginPage = ({ onLogin }) => {
            const [mode, setMode] = useState('login'); // login, signup, reset
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [error, setError] = useState('');

            const handleEmailLogin = async (e) => {
                e.preventDefault();
                setLoading(true); setError(''); setMessage('');
                try {
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                } catch (e) { setError(e.message); }
                setLoading(false);
            };

            const handleSignUp = async (e) => {
                e.preventDefault();
                setLoading(true); setError(''); setMessage('');
                try {
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    setMessage('確認メールを送信しました。メールを確認してください。');
                } catch (e) { setError(e.message); }
                setLoading(false);
            };

            const handleGoogleLogin = async () => {
                setLoading(true); setError('');
                try {
                    const { error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: window.location.origin + window.location.pathname }
                    });
                    if (error) throw error;
                } catch (e) { setError(e.message); }
                setLoading(false);
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                setLoading(true); setError(''); setMessage('');
                try {
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + window.location.pathname
                    });
                    if (error) throw error;
                    setMessage('パスワードリセットメールを送信しました。メールを確認してください。');
                } catch (e) { setError(e.message); }
                setLoading(false);
            };

            const LogoIcon = () => (
                <svg className="w-12 h-12" viewBox="0 0 32 32" fill="none">
                    <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#4f8cff" /><stop offset="100%" stopColor="#3b6fd9" /></linearGradient></defs>
                    <rect width="32" height="32" rx="8" fill="url(#lg)" />
                    <rect x="8" y="5" width="16" height="21" rx="2" fill="white" opacity="0.95" />
                    <line x1="12" y1="11" x2="20" y2="11" stroke="#4f8cff" strokeWidth="1.5" strokeLinecap="round" />
                    <line x1="12" y1="15" x2="20" y2="15" stroke="#4f8cff" strokeWidth="1.5" strokeLinecap="round" />
                    <line x1="12" y1="19" x2="17" y2="19" stroke="#4f8cff" strokeWidth="1.5" strokeLinecap="round" />
                    <path d="M21 22l3-3-1.5-1.5L19 21v1.5H20.5L21 22z" fill="#f59e0b" />
                </svg>
            );

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-sky-50 to-indigo-50 flex items-center justify-center p-4">
                    <div className="w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="flex justify-center mb-4"><LogoIcon /></div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-600 to-sky-500 bg-clip-text text-transparent">書類作成支援</h1>
                            <p className="text-gray-500 mt-2 text-sm">在宅就労支援の書類作成を、もっとかんたんに。</p>
                        </div>

                        <div className="glass p-8 rounded-2xl">
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4">{error}</div>}
                            {message && <div className="bg-green-50 text-green-600 p-3 rounded-lg text-sm mb-4">{message}</div>}

                            {mode === 'reset' ? (
                                <form onSubmit={handleResetPassword}>
                                    <h2 className="text-xl font-bold text-gray-800 mb-4">パスワードをリセット</h2>
                                    <p className="text-sm text-gray-500 mb-4">メールアドレスを入力してください。リセットリンクをお送りします。</p>
                                    <div className="mb-4">
                                        <label className="block text-sm font-bold text-gray-600 mb-1">メールアドレス</label>
                                        <input type="email" className="input-field" value={email} onChange={e => setEmail(e.target.value)} placeholder="example@email.com" required />
                                    </div>
                                    <button type="submit" disabled={loading} className="btn btn-primary w-full h-12 text-base">
                                        {loading ? '送信中...' : 'リセットメールを送信'}
                                    </button>
                                    <button type="button" onClick={() => { setMode('login'); setError(''); setMessage(''); }} className="w-full text-center text-sm text-emerald-600 hover:underline mt-4">
                                        ログインに戻る
                                    </button>
                                </form>
                            ) : (
                                <>
                                    <h2 className="text-xl font-bold text-gray-800 mb-6">{mode === 'login' ? 'ログイン' : 'アカウント作成'}</h2>

                                    {/* Google ログイン */}
                                    <button onClick={handleGoogleLogin} disabled={loading}
                                        className="w-full flex items-center justify-center gap-3 h-12 border-2 border-gray-200 rounded-xl font-medium text-gray-700 hover:bg-gray-50 transition mb-4">
                                        <svg className="w-5 h-5" viewBox="0 0 24 24">
                                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4" />
                                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                                        </svg>
                                        Googleで{mode === 'login' ? 'ログイン' : 'アカウント作成'}
                                    </button>

                                    <div className="flex items-center gap-3 my-5">
                                        <div className="flex-1 h-px bg-gray-200"></div>
                                        <span className="text-xs text-gray-400">or</span>
                                        <div className="flex-1 h-px bg-gray-200"></div>
                                    </div>

                                    {/* メール + パスワード */}
                                    <form onSubmit={mode === 'login' ? handleEmailLogin : handleSignUp}>
                                        <div className="mb-4">
                                            <label className="block text-sm font-bold text-gray-600 mb-1">メールアドレス</label>
                                            <input type="email" className="input-field" value={email} onChange={e => setEmail(e.target.value)} placeholder="example@email.com" required />
                                        </div>
                                        <div className="mb-2">
                                            <label className="block text-sm font-bold text-gray-600 mb-1">パスワード</label>
                                            <input type="password" className="input-field" value={password} onChange={e => setPassword(e.target.value)} placeholder="6文字以上" required minLength={6} />
                                        </div>

                                        {mode === 'login' && (
                                            <div className="text-right mb-4">
                                                <button type="button" onClick={() => { setMode('reset'); setError(''); setMessage(''); }} className="text-sm text-emerald-600 hover:underline">
                                                    パスワードをお忘れですか？
                                                </button>
                                            </div>
                                        )}

                                        <button type="submit" disabled={loading} className="btn btn-primary w-full h-12 text-base mt-2">
                                            {loading ? '処理中...' : (mode === 'login' ? 'ログイン' : 'アカウントを作成')}
                                        </button>
                                    </form>

                                    <p className="text-center text-sm text-gray-500 mt-5">
                                        {mode === 'login' ? 'アカウントをお持ちでない場合 ' : 'すでにアカウントをお持ちの場合 '}
                                        <button type="button" onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); setMessage(''); }}
                                            className="text-emerald-600 font-bold hover:underline">
                                            {mode === 'login' ? '新規登録' : 'ログイン'}
                                        </button>
                                    </p>
                                </>
                            )}
                        </div>
                        <p className="text-center text-xs text-gray-400 mt-6">© 2026 書類作成支援</p>
                    </div>
                </div>
            );
        };

        // --- メインコンポーネント ---
        const App = () => {
            // 認証状態
            const [authUser, setAuthUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);

            useEffect(() => {
                // 現在のセッションを取得
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setAuthUser(session?.user ?? null);
                    setAuthLoading(false);
                });
                // 認証状態の変化を監視
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setAuthUser(session?.user ?? null);
                });
                return () => subscription.unsubscribe();
            }, []);

            const handleLogout = async () => {
                await supabase.auth.signOut();
                setAuthUser(null);
            };

            // 認証ローディング中
            if (authLoading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-sky-50 to-indigo-50 flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-emerald-200 border-t-emerald-500 rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-500">読み込み中...</p>
                        </div>
                    </div>
                );
            }

            // 未ログイン → ログインページ
            if (!authUser) {
                return <LoginPage />;
            }

            // ログイン済み → メインアプリ
            return <MainApp authUser={authUser} onLogout={handleLogout} />;
        };

        // --- メインアプリ (ログイン後) ---
        const MainApp = ({ authUser, onLogout }) => {
            // State
            const [view, setView] = useState('input');
            const [users, setUsers] = useState([]);
            const [records, setRecords] = useState([]);
            const [supabaseStatus, setSupabaseStatus] = useState('connecting');

            // ふりがなのあいうえお順にソートした利用者リスト
            const sortedUsers = useMemo(() => [...users].sort((a, b) => (a.furigana || a.name).localeCompare(b.furigana || b.name, 'ja')), [users]);

            // APIキーの初期化
            const [apiKey, setApiKey] = useState(() => {
                if (MANUAL_API_KEY) return MANUAL_API_KEY;
                return localStorage.getItem('sw_api_key') || '';
            });

            // 入力フォームの状態
            const [formData, setFormData] = useState({
                userId: '',
                implementationDate: new Date().toISOString().split('T')[0],
                previousDate: '',
                periodStart: '',
                periodEnd: '',
                selectedMethod: 'commute',
                condition: '',
                workContent: '',
                goals: '',
                recorder: '',
                manager: '近藤恵子'
            });

            // 生成中のステータス管理
            const [loadingState, setLoadingState] = useState({
                condition: false,
                workContent: false,
                goals: false
            });

            // --- 月1達成度評価 State ---
            const now = new Date();
            const [monthlyFormData, setMonthlyFormData] = useState({
                userId: '',
                targetYear: now.getFullYear(),
                targetMonth: now.getMonth() + 1,
                implementationDate: now.toISOString().split('T')[0],
                timeStart: '10:00',
                timeEnd: '10:15',
                method: 'commute',
                methodOther: '',
                trainingGoal: '',
                activities: '',
                achievement: '',
                issues: '',
                improvementPlan: '',
                healthNotes: '',
                otherNotes: '',
                workValidity: '',
                evaluator: '近藤恵子',
                previousEvalDate: ''
            });
            const [monthlyLoading, setMonthlyLoading] = useState({});

            // --- 週評価 一括自動作成用 State ---
            const [autoCreatePopup, setAutoCreatePopup] = useState(null);
            // { targetDate: 'YYYY-MM-DD', targetUsers: [...], periodStart: '...', periodEnd: '...' }
            const [autoCreateLoading, setAutoCreateLoading] = useState(false);
            const [autoCreateTargetDate, setAutoCreateTargetDate] = useState(new Date().toISOString().split('T')[0]);
            const [autoCreateProgress, setAutoCreateProgress] = useState(''); // 進捗メッセージ

            // --- 保存済み月次評価データ ---
            const [savedMonthlyEvals, setSavedMonthlyEvals] = useState(() => {
                try {
                    const saved = localStorage.getItem('sw_monthly_evaluations');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            // localStorage バックアップ（月次評価）
            useEffect(() => { localStorage.setItem('sw_monthly_evaluations', JSON.stringify(savedMonthlyEvals)); }, [savedMonthlyEvals]);

            const [bulkCreating, setBulkCreating] = useState(false);

            // --- 全利用者の達成度評価を一括自動作成 ---
            const autoCreateAllMonthlyEvaluations = async () => {
                setBulkCreating(true);
                try {
                    const year = monthlyFormData.targetYear;
                    const month = monthlyFormData.targetMonth;
                    let currentKey = apiKey || MANUAL_API_KEY;

                    // APIキーがない場合、Supabaseから直接取得を試みる
                    if (!currentKey) {
                        try {
                            console.log('APIキーをSupabaseから取得中...');
                            const { data, error } = await supabase
                                .from('api_keys')
                                .select('value')
                                .eq('key', 'gemini_api_key')
                                .single();
                            if (!error && data && data.value) {
                                currentKey = data.value;
                                setApiKey(data.value);
                                localStorage.setItem('sw_api_key', data.value);
                                console.log('APIキーをSupabaseから取得しました');
                            }
                        } catch (e) {
                            console.error('APIキー取得失敗:', e);
                        }
                    }

                    if (!currentKey) {
                        alert('⚠️ APIキーが設定されていません。AI自動生成ができないため、課題・改善方針等の欄は空白になります。\n\n設定画面でAPIキーを確認してください。');
                    }

                    // 対象月の週評価データがある利用者を取得
                    const usersWithRecords = users.filter(user => {
                        return records.some(r => {
                            if (r.userId !== user.id) return false;
                            const d = new Date(r.implementationDate);
                            return d.getFullYear() === year && (d.getMonth() + 1) === month;
                        });
                    });

                    if (usersWithRecords.length === 0) {
                        alert(`${year}年${month}月の週評価データを持つ利用者がいません。`);
                        return;
                    }

                    // 既存の評価との重複チェック
                    const alreadyCreated = usersWithRecords.filter(user =>
                        savedMonthlyEvals.some(e => e.userId === user.id && e.targetYear === year && e.targetMonth === month)
                    );

                    if (alreadyCreated.length > 0) {
                        const names = alreadyCreated.map(u => u.name).join('、');
                        if (!confirm(`以下の利用者は既に${month}月の達成度評価が作成済みです：\n${names}\n\n上書きしますか？`)) {
                            return;
                        }
                    }

                    const implementationDate = `${year}-${String(month).padStart(2, '0')}-15`;
                    const newEvals = [];
                    let aiSuccessCount = 0;
                    let aiFailCount = 0;
                    let workingModelName = null; // 動作するモデルをキャッシュ

                    for (const user of usersWithRecords) {
                        const userRecords = records.filter(r => {
                            if (r.userId !== user.id) return false;
                            const d = new Date(r.implementationDate);
                            return d.getFullYear() === year && (d.getMonth() + 1) === month;
                        }).sort((a, b) => new Date(a.implementationDate) - new Date(b.implementationDate));

                        const goalTexts = userRecords.map(r => r.goals).filter(Boolean);
                        const workTexts = userRecords.map(r => r.workContent).filter(Boolean);
                        const condTexts = userRecords.map(r => r.condition).filter(Boolean);

                        const trainingGoal = goalTexts.length > 0 ? goalTexts[goalTexts.length - 1] : '（データなし）';
                        const activities = workTexts.length > 0 ? workTexts.join('\n') : '（データなし）';
                        const achievement = condTexts.length > 0 ? condTexts.join('\n') : '（データなし）';

                        // AI で課題・改善方針・健康面・その他・妥当性を自動生成
                        let issues = '', improvementPlan = '', healthNotes = '', otherNotes = '', workValidity = '';

                        if (currentKey && trainingGoal !== '（データなし）') {
                            const baseContext = `
利用者: ${user.name}
【訓練目標】${trainingGoal}
【取組内容】${activities}
【訓練目標に対する達成度】${achievement}`;

                            const aiFields = [
                                { key: 'issues', instruction: `以下の「訓練目標」「取組内容」「訓練目標に対する達成度」の内容を元に、在宅就労における「課題」を1〜2文で作成してください。支援の視点から書いてください。例：「調べ物の手順を丁寧に教え、理解を深めるよう支援する。楽しさも意識し取り組めるようにする。」` },
                                { key: 'improvementPlan', instruction: `以下の内容を元に、「今後における課題の改善方針」を1〜2文で作成してください。段階的な支援と職員間の連携を含めてください。例：「今後は課題に対し段階的に支援を行い、職員間で連携を取りながら改善に努める。」` },
                                { key: 'healthNotes', instruction: `以下の内容を元に、「健康・体調面での留意事項」を2〜3文で作成してください。月に一度の面会、LINEやDiscordでの連絡、電話でのフォロー、関係各所との情報共有などを含めてください。例：「最低でも月に一度は面会し健康面、体調面を把握しておく。連絡がない時はまずはLINEやDiscordで連絡し、返答がない場合は電話などで連絡する。」` },
                                { key: 'otherNotes', instruction: `以下の内容を元に、「その他特記事項」を作成してください。特に内容がなければ「特になし」とだけ出力してください。` },
                                { key: 'workValidity', instruction: `以下の内容を元に、「在宅就労継続の妥当性」を1〜2文で作成してください。作業状況の確認と定期的な検討について書いてください。例：「在宅での作業状況を確認し、継続の妥当性について定期的に検討していく。」` }
                            ];

                            // 動作するモデルを特定（まだ見つけていない場合）
                            if (!workingModelName) {
                                const genAI = new window.GoogleGenerativeAI(currentKey);
                                const modelsToTry = ['gemini-2.0-flash', 'gemini-2.0-flash-lite', 'gemini-1.5-flash', 'gemini-1.5-flash-latest'];
                                for (const modelName of modelsToTry) {
                                    try {
                                        console.log(`モデルテスト: ${modelName}`);
                                        const model = genAI.getGenerativeModel({ model: modelName });
                                        const testResult = await model.generateContent('テスト。「OK」とだけ返してください。');
                                        const testResponse = await testResult.response;
                                        const testText = testResponse.text();
                                        if (testText) {
                                            workingModelName = modelName;
                                            console.log(`動作するモデル発見: ${workingModelName}`);
                                            break;
                                        }
                                    } catch (e) {
                                        console.warn(`モデル ${modelName} 失敗:`, e.message);
                                    }
                                }
                                if (!workingModelName) {
                                    console.error('利用可能なモデルが見つかりません');
                                    break;
                                }
                            }

                            // 確定モデルで各フィールドを生成
                            const genAI = new window.GoogleGenerativeAI(currentKey);
                            const model = genAI.getGenerativeModel({ model: workingModelName });

                            for (const field of aiFields) {
                                try {
                                    const prompt = `あなたは障害福祉サービスの就労継続支援B型の支援員です。在宅における就労達成度評価シートの記入を行っています。\n\n【指示】${field.instruction}\n福祉支援記録として適切な文章にしてください。出力はプレーンテキストのみ。\n\n【キーワード】\n${baseContext}`;
                                    console.log(`AI生成中: ${field.key} for ${user.name} (model: ${workingModelName})`);
                                    const result = await model.generateContent(prompt);
                                    const response = await result.response;
                                    const text = response.text();
                                    if (text && text.trim()) {
                                        aiSuccessCount++;
                                        if (field.key === 'issues') issues = text.trim();
                                        else if (field.key === 'improvementPlan') improvementPlan = text.trim();
                                        else if (field.key === 'healthNotes') healthNotes = text.trim();
                                        else if (field.key === 'otherNotes') otherNotes = text.trim();
                                        else if (field.key === 'workValidity') workValidity = text.trim();
                                    } else {
                                        aiFailCount++;
                                    }
                                    // レート制限回避のため1秒待機
                                    await new Promise(resolve => setTimeout(resolve, 1000));
                                } catch (e) {
                                    aiFailCount++;
                                    console.error(`AI generation failed for ${field.key}:`, e.message);
                                    // エラー時は2秒待機してから次へ
                                    await new Promise(resolve => setTimeout(resolve, 2000));
                                }
                            }
                        } else {
                            console.warn(`AI生成スキップ: currentKey=${!!currentKey}, trainingGoal=${trainingGoal}`);
                        }

                        // 前月の評価日を検索
                        const prevEval = savedMonthlyEvals
                            .filter(e => e.userId === user.id && (e.targetYear < year || (e.targetYear === year && e.targetMonth < month)))
                            .sort((a, b) => (b.targetYear * 12 + b.targetMonth) - (a.targetYear * 12 + a.targetMonth))[0];

                        newEvals.push({
                            id: generateId(),
                            userId: user.id,
                            targetYear: year,
                            targetMonth: month,
                            implementationDate: implementationDate,
                            timeStart: '10:00',
                            timeEnd: '10:15',
                            method: 'commute',
                            methodOther: '',
                            trainingGoal,
                            activities,
                            achievement,
                            issues,
                            improvementPlan,
                            healthNotes,
                            otherNotes,
                            workValidity,
                            evaluator: '近藤恵子',
                            previousEvalDate: prevEval ? prevEval.implementationDate : '',
                            createdAt: new Date().toISOString()
                        });
                    }

                    // 既存の同月評価を除去し、新しいものを追加
                    setSavedMonthlyEvals(prev => {
                        const filtered = prev.filter(e => !(e.targetYear === year && e.targetMonth === month && usersWithRecords.some(u => u.id === e.userId)));
                        return [...filtered, ...newEvals];
                    });

                    const aiMsg = currentKey ? `\nAI生成: 成功${aiSuccessCount}件, 失敗${aiFailCount}件` : '\n⚠️ APIキー未設定のためAI生成はスキップされました';
                    alert(`${usersWithRecords.length}名分の${month}月達成度評価を自動作成しました。${aiMsg}\n下の一覧からExcelダウンロードできます。`);
                } catch (err) {
                    console.error('一括作成エラー:', err);
                    const errorDetail = `エラー種類: ${err.name || 'N/A'}\nメッセージ: ${err.message || 'N/A'}\nスタック: ${(err.stack || '').split('\n').slice(0, 3).join('\n')}`;
                    alert(`エラーが発生しました:\n\n${errorDetail}`);
                } finally {
                    setBulkCreating(false);
                }
            };

            // --- 保存済み月次評価を個別Excel出力 ---
            const exportSavedMonthlyExcel = (evalData) => {
                const user = users.find(u => u.id === evalData.userId);
                if (!user) { alert('利用者情報が見つかりません'); return; }

                const ws = createMonthlyFormSheet(evalData, user);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '達成度評価');
                const fileName = `${user.name}_${evalData.targetYear}年${evalData.targetMonth}月_達成度評価.xlsx`;
                XLSX.writeFile(wb, fileName);
            };

            // --- 保存済み月次評価を削除 ---
            const deleteMonthlyEval = (evalId) => {
                if (confirm('この達成度評価を削除しますか？')) {
                    setSavedMonthlyEvals(prev => prev.filter(e => e.id !== evalId));
                }
            };


            // --- Supabase ヘルパー関数 ---
            const loadFromSupabase = async () => {
                try {
                    const { data: usersData, error: usersError } = await supabase.from('users').select('*');
                    if (usersError) throw usersError;
                    const mappedUsers = (usersData || []).map(u => ({ id: u.id, name: u.name, furigana: u.furigana || '', number: u.number || '' }));
                    setUsers(mappedUsers);
                    localStorage.setItem('sw_users', JSON.stringify(mappedUsers));

                    const { data: recordsData, error: recordsError } = await supabase.from('records').select('*');
                    if (recordsError) throw recordsError;
                    const mappedRecords = (recordsData || []).map(r => ({
                        id: r.id,
                        userId: r.user_id,
                        implementationDate: r.implementation_date,
                        previousDate: r.previous_date,
                        periodStart: r.period_start,
                        periodEnd: r.period_end,
                        selectedMethod: r.selected_method || r.methods ? (typeof r.selected_method === 'string' ? r.selected_method : (r.methods && typeof r.methods === 'object' ? Object.keys(r.methods).find(k => r.methods[k]) || 'commute' : 'commute')) : 'commute',
                        condition: r.condition || '',
                        workContent: r.work_content || '',
                        goals: r.goals || '',
                        recorder: r.recorder || '',
                        manager: r.manager || '近藤恵子'
                    }));
                    setRecords(mappedRecords);
                    localStorage.setItem('sw_records', JSON.stringify(mappedRecords));

                    setSupabaseStatus('connected');
                    console.log('✅ Supabase からデータを読み込みました');
                } catch (e) {
                    console.error('Supabase 読み込みエラー:', e);
                    setSupabaseStatus('error');
                    // フォールバック: localStorage から読み込み
                    const savedUsers = localStorage.getItem('sw_users');
                    const savedRecords = localStorage.getItem('sw_records');
                    if (savedUsers) try { setUsers(JSON.parse(savedUsers)); } catch (e2) { }
                    if (savedRecords) try { setRecords(JSON.parse(savedRecords)); } catch (e2) { }
                }
            };

            const saveUserToSupabase = async (user) => {
                try {
                    const { error } = await supabase.from('users').upsert({ id: user.id, name: user.name, furigana: user.furigana || '', number: user.number || '' });
                    if (error) throw error;
                } catch (e) { console.error('ユーザー保存エラー:', e); }
            };

            const deleteUserFromSupabase = async (userId) => {
                try {
                    const { error } = await supabase.from('users').delete().eq('id', userId);
                    if (error) throw error;
                } catch (e) { console.error('ユーザー削除エラー:', e); }
            };

            const saveRecordToSupabase = async (record) => {
                try {
                    console.log('💾 Saving record to Supabase...', record.id);
                    const { error } = await supabase.from('records').upsert({
                        id: record.id,
                        user_id: record.userId,
                        implementation_date: record.implementationDate,
                        previous_date: record.previousDate,
                        period_start: record.periodStart,
                        period_end: record.periodEnd,
                        methods: { [record.selectedMethod]: true },
                        condition: record.condition,
                        work_content: record.workContent,
                        goals: record.goals,
                        recorder: record.recorder,
                        manager: record.manager
                    });
                    if (error) throw error;
                    console.log('✅ Record saved successfully:', record.id);
                } catch (e) {
                    console.error('記録保存エラー:', e);
                    alert('記録の保存に失敗しました: ' + (e.message || JSON.stringify(e)));
                }
            };

            const deleteRecordFromSupabase = async (recordId) => {
                try {
                    const { error } = await supabase.from('records').delete().eq('id', recordId);
                    if (error) throw error;
                } catch (e) { console.error('記録削除エラー:', e); }
            };

            // 初期ロード (Supabase優先、フォールバックはlocalStorage)
            useEffect(() => {
                loadFromSupabase();
            }, []);

            // localStorage バックアップ保存
            useEffect(() => { localStorage.setItem('sw_users', JSON.stringify(users)); }, [users]);
            useEffect(() => { localStorage.setItem('sw_records', JSON.stringify(records)); }, [records]);

            // --- 週評価 一括自動作成: 対象利用者を算出 ---
            const prepareAutoCreate = () => {
                const targetDate = autoCreateTargetDate;
                if (!targetDate) { alert('実施日を選択してください'); return; }

                // 対象期間を計算（実施日を基準に前週の月〜日）
                const implDateObj = new Date(targetDate);
                const day = implDateObj.getDay();
                const diffToMon = (day === 0 ? -6 : 1) - day;
                const thisMon = new Date(implDateObj);
                thisMon.setDate(implDateObj.getDate() + diffToMon);
                const lastMon = new Date(thisMon);
                lastMon.setDate(thisMon.getDate() - 7);
                const lastSun = new Date(lastMon);
                lastSun.setDate(lastMon.getDate() + 6);
                const periodStart = lastMon.toISOString().split('T')[0];
                const periodEnd = lastSun.toISOString().split('T')[0];

                // 各利用者で、記録が1件以上あり、かつ対象期間の記録がまだない利用者を抽出
                const targetUsers = users.filter(user => {
                    const userRecords = records.filter(r => r.userId === user.id);
                    if (userRecords.length === 0) return false;
                    const alreadyExists = userRecords.some(r => r.periodStart === periodStart && r.periodEnd === periodEnd);
                    return !alreadyExists;
                });

                if (targetUsers.length === 0) {
                    alert('対象となる利用者がいません。\n（全利用者の週評価が既に作成済み、または記録が1件もありません）');
                    return;
                }

                setAutoCreatePopup({ targetDate, targetUsers, periodStart, periodEnd });
            };

            // --- 週評価 一括自動作成 実行（AI言い回し変換付き） ---
            const autoCreateWeeklyRecords = async () => {
                if (!autoCreatePopup) return;
                const currentKey = apiKey || MANUAL_API_KEY;

                setAutoCreateLoading(true);
                setAutoCreateProgress('');
                const { targetDate, targetUsers, periodStart, periodEnd } = autoCreatePopup;
                const newRecords = [];

                for (let i = 0; i < targetUsers.length; i++) {
                    const user = targetUsers[i];
                    setAutoCreateProgress(`${user.name} さんの記録を作成中... (${i + 1}/${targetUsers.length})`);

                    // 最新の記録を取得
                    const userRecords = records
                        .filter(r => r.userId === user.id)
                        .sort((a, b) => new Date(b.implementationDate) - new Date(a.implementationDate));
                    const latest = userRecords[0];
                    if (!latest) continue;

                    // 前回実施日を計算
                    const prevRecords = records
                        .filter(r => r.userId === user.id && new Date(r.implementationDate) < new Date(targetDate))
                        .sort((a, b) => new Date(b.implementationDate) - new Date(a.implementationDate));
                    const previousDate = prevRecords.length > 0 ? prevRecords[0].implementationDate : latest.implementationDate;

                    // AI で言い回しを変える
                    let newCondition = latest.condition || '';
                    let newWorkContent = latest.workContent || '';
                    let newGoals = latest.goals || '';

                    if (currentKey) {
                        const rephrasePrompt = (fieldName, text) => {
                            const fieldDesc = {
                                condition: '利用者の体調について',
                                workContent: '在宅での1週間の作業内容について',
                                goals: '今後の目標'
                            };
                            return `
あなたは障害福祉サービスの就労継続支援B型の支援員です。
以下は前回の週評価の「${fieldDesc[fieldName]}」の記録です。
この内容を参考に、同じ意味合い・状況を維持しつつ、言い回しや表現を少し変えた新しい文章を作成してください。
文章の長さは元の文章とほぼ同じにしてください。「です・ます」調で、2〜3文程度にしてください。
出力は作成した文章のみを行ってください。

【前回の記録】
${text}`;
                        };

                        try {
                            const [c, w, g] = await Promise.all([
                                latest.condition ? generateGeminiContent(rephrasePrompt('condition', latest.condition), '', currentKey, null).catch(() => latest.condition) : Promise.resolve(''),
                                latest.workContent ? generateGeminiContent(rephrasePrompt('workContent', latest.workContent), '', currentKey, null).catch(() => latest.workContent) : Promise.resolve(''),
                                latest.goals ? generateGeminiContent(rephrasePrompt('goals', latest.goals), '', currentKey, null).catch(() => latest.goals) : Promise.resolve('')
                            ]);
                            newCondition = (c || '').trim() || latest.condition;
                            newWorkContent = (w || '').trim() || latest.workContent;
                            newGoals = (g || '').trim() || latest.goals;
                        } catch (e) {
                            console.warn('AI rephrasing failed for ' + user.name + ', using original text:', e);
                        }
                    }

                    const newRecord = {
                        id: generateId(),
                        userId: user.id,
                        implementationDate: targetDate,
                        previousDate,
                        periodStart,
                        periodEnd,
                        selectedMethod: latest.selectedMethod || 'commute',
                        condition: newCondition,
                        workContent: newWorkContent,
                        goals: newGoals,
                        recorder: latest.recorder || '',
                        manager: '近藤恵子'
                    };
                    newRecords.push(newRecord);
                }

                // 保存
                setAutoCreateProgress('クラウドに保存中...');
                for (const rec of newRecords) {
                    await saveRecordToSupabase(rec);
                }
                setRecords(prev => [...newRecords, ...prev]);

                setAutoCreatePopup(null);
                setAutoCreateLoading(false);
                setAutoCreateProgress('');
                alert(`${newRecords.length}名分の週評価を自動作成しました。`);
            };

            const dismissAutoCreate = () => {
                setAutoCreatePopup(null);
            };

            // APIキーの取得（Supabaseから自動取得）
            useEffect(() => {
                const fetchSystemApiKey = async () => {
                    if (!authUser) return;

                    try {
                        const { data, error } = await supabase
                            .from('app_settings')
                            .select('value')
                            .eq('key', 'gemini_api_key')
                            .single();

                        if (error) {
                            console.warn('APIキーの取得に失敗:', error);
                        } else if (data) {
                            console.log('共通APIキーを読み込みました');
                            setApiKey(data.value);
                            localStorage.setItem('sw_api_key', data.value);
                        }
                    } catch (err) {
                        console.error('APIキー設定エラー:', err);
                    }
                };

                fetchSystemApiKey();
            }, [authUser]);

            // --- 自動計算ロジック ---
            const handleDateChange = (date) => {
                let newData = { ...formData, implementationDate: date };

                if (formData.userId) {
                    const userRecords = records
                        .filter(r => r.userId === formData.userId && new Date(r.implementationDate) < new Date(date))
                        .sort((a, b) => new Date(b.implementationDate) - new Date(a.implementationDate));

                    if (userRecords.length > 0) {
                        newData.previousDate = userRecords[0].implementationDate;
                    } else {
                        const prev = new Date(date);
                        prev.setDate(prev.getDate() - 7);
                        newData.previousDate = prev.toISOString().split('T')[0];
                    }

                    const implDateObj = new Date(date);
                    const day = implDateObj.getDay();
                    const diffToMon = (day === 0 ? -6 : 1) - day;

                    const thisMon = new Date(implDateObj);
                    thisMon.setDate(implDateObj.getDate() + diffToMon);

                    const lastMon = new Date(thisMon);
                    lastMon.setDate(thisMon.getDate() - 7);

                    const lastSun = new Date(lastMon);
                    lastSun.setDate(lastMon.getDate() + 6);

                    newData.periodStart = lastMon.toISOString().split('T')[0];
                    newData.periodEnd = lastSun.toISOString().split('T')[0];
                }
                setFormData(newData);
            };

            const handleUserChange = (uid) => {
                setFormData(prev => ({ ...prev, userId: uid }));
            };

            useEffect(() => {
                if (formData.userId) {
                    handleDateChange(formData.implementationDate);
                }
            }, [formData.userId]);

            // --- Gemini AI 生成 (共通関数) ---
            // 動的モデル探索機能付き
            const generateGeminiContent = async (systemPrompt, userText, apiKey, onStatusUpdate) => {
                const genAI = new window.GoogleGenerativeAI(apiKey);

                // 1. 優先モデルリスト (高速・高性能な順)
                let modelsToTry = [
                    'gemini-2.5-flash',
                    'gemini-2.0-flash',
                    'gemini-2.0-flash-lite',
                    'gemini-1.5-flash',
                    'gemini-1.5-flash-latest',
                    'gemini-flash-latest'
                ];

                let lastError = null;

                // ヘルパー: モデルリストで試行
                const tryModels = async (list) => {
                    for (const modelName of list) {
                        try {
                            if (onStatusUpdate) onStatusUpdate(`モデル試行中: ${modelName}...`);
                            console.log(`Trying model: ${modelName}`);
                            const model = genAI.getGenerativeModel({ model: modelName });
                            const result = await model.generateContent(systemPrompt + `\n\n【キーワード】\n${userText}`);
                            const response = await result.response;
                            return response.text();
                        } catch (e) {
                            console.warn(`Model ${modelName} failed:`, e);
                            lastError = e;
                        }
                    }
                    return null;
                };

                // ステップ1: 優先リストで試行
                let text = await tryModels(modelsToTry);
                if (text) return text;

                // ステップ2: 失敗した場合、動的に利用可能なモデルを取得して試行
                if (onStatusUpdate) onStatusUpdate('利用可能なモデルを検索中...');
                try {
                    console.log('Fetching available models from API...');
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const data = await res.json();

                    if (data.models) {
                        const availableModels = data.models
                            .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'))
                            .map(m => m.name.replace('models/', ''))
                            .filter(name => !modelsToTry.includes(name))
                            .filter(name => name.includes('gemini'))
                            .sort((a, b) => {
                                const score = (name) => {
                                    let s = 0;
                                    if (name.includes('flash')) s += 10;
                                    if (name.includes('latest')) s += 5;
                                    if (name.includes('002')) s += 2;
                                    if (name.includes('2.0')) s += 20;
                                    if (name.includes('1.5')) s += 15;
                                    return s;
                                };
                                return score(b) - score(a);
                            });

                        if (availableModels.length > 0) {
                            console.log('Discovered models:', availableModels);
                            if (onStatusUpdate) onStatusUpdate(`新モデルで再試行中...`);
                            text = await tryModels(availableModels);
                            if (text) return text;
                        }
                    }
                } catch (e) {
                    console.error('Model discovery failed:', e);
                }

                throw lastError || new Error('全てのモデルで生成に失敗しました。');
            };

            // --- Gemini AI 生成 (項目ごと) ---
            const generateSingleContent = async (targetField) => {

                const currentKey = apiKey || MANUAL_API_KEY;

                if (!currentKey) {

                } else if (targetField === 'workContent') {

                } else if (targetField === 'goals') {
                    instruction = "入力されたキーワードを元に、「今後の目標」の週評価報告文章を2〜3文程度で簡潔に作成してください。支援員が利用者との聞き取りを踏まえ、来週に向けた目標を記録したものです。福祉支援記録として適切な「です・ます」調の文章にしてください。";
                }

                const systemPrompt = `
                    あなたは障害福祉サービスの就労継続支援B型の支援員です。
                    利用者への聞き取りを元に、週間評価の報告文章を作成してください。

                `;

                try {

                        // ステータス表示があればここで更新できる（現在はloadingのみ）

                    setLoadingState(prev => ({ ...prev, [targetField]: false }));
                }
            };

            // --- 記録保存 ---
            const saveRecord = async () => {
                if (!formData.userId) { alert('利用者を選択してください'); return; }

                // フォームリセット
                setFormData(prev => ({

                    condition: '',

            // --- Excel出力（帳票様式） ---
            const thinBorder = { style: 'thin', color: { rgb: '000000' } };
            const allBorders = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
            const headerFont = { bold: true, sz: 10, name: 'ＭＳ Ｐゴシック' };
            const bodyFont = { sz: 10, name: 'ＭＳ Ｐゴシック' };

                ];

                const ws = XLSX.utils.aoa_to_sheet(data);

                // 列幅設定 (A~I列の9列)
                ws['!cols'] = [
                    { wch: 14 }, // A: ラベル

                    { wch: 10 }, // C
                    { wch: 5 },  // D
                    { wch: 14 }, // E
                    { wch: 10 }, // F
                    { wch: 14 }, // G
                    { wch: 8 },  // H
                    { wch: 12 }, // I
                ];

                // 行高さ設定
                ws['!rows'] = [
                    { hpt: 30 },  // 行0: タイトル
                    { hpt: 22 },  // 行1: 実施日
                    { hpt: 20 },  // 行2: 方法上段
                    { hpt: 20 },  // 行3: 方法下段
                    { hpt: 22 },  // 行4: 対象期間
                    { hpt: 25 },  // 行5: モニタリング内容

                    { hpt: 30 },  // 行9: 作業内容

                    { hpt: 18 },  // 行16: フッター
                ];

                // セル結合の定義
                ws['!merges'] = [
                    // 行0: タイトル

                    { s: { r: 0, c: 4 }, e: { r: 0, c: 8 } }, // 注記
                    // 行1: 実施日

                    { s: { r: 1, c: 5 }, e: { r: 1, c: 8 } }, // 前回実施日の値
                    // 行2-3: 方法
                    { s: { r: 2, c: 0 }, e: { r: 3, c: 1 } }, // 「方法」ラベル

                    // 行9-11: 作業内容
                    { s: { r: 9, c: 0 }, e: { r: 11, c: 1 } }, // ラベル

                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let r = range.s.r; r <= range.e.r; r++) {

            };

            // 帳票様式で1件出力
            const exportFormattedExcel = (rec) => {

            // 1ヶ月分帳票出力（1シートにまとめる）

                    // データをセルに書き込み

                    rowHeights.forEach((h, i) => { ws['!rows'][offset + i] = { hpt: h }; });

                    // セル結合（オフセット適用）
                    const merges = [
                        { s: { r: 0, c: 0 }, e: { r: 0, c: 1 } },
                        { s: { r: 0, c: 4 }, e: { r: 0, c: 8 } },

                        { s: { r: 2, c: 0 }, e: { r: 3, c: 1 } },

                        { s: { r: 5, c: 0 }, e: { r: 5, c: 8 } },

                        { s: { r: 12, c: 2 }, e: { r: 14, c: 8 } },
                        { s: { r: 15, c: 1 }, e: { r: 15, c: 3 } },
                        { s: { r: 15, c: 5 }, e: { r: 15, c: 8 } },
                        { s: { r: 16, c: 6 }, e: { r: 16, c: 8 } },
                    ];
                    merges.forEach(m => {
                        ws['!merges'].push({
                            s: { r: m.s.r + offset, c: m.s.c },
                            e: { r: m.e.r + offset, c: m.e.c }
                        });
                    });

                    // スタイル適用
                    const sc = (r, c, style) => {
                        const addr = XLSX.utils.encode_cell({ r: offset + r, c });
                        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
                        ws[addr].s = { ...ws[addr].s, ...style };
                    };

                    // 行0: タイトル
                    sc(0, 0, { font: titleFont, alignment: { horizontal: 'left', vertical: 'center' }, border: { bottom: thinBorder } });
                    sc(0, 1, { font: titleFont, border: { bottom: thinBorder } });
                    for (let c = 2; c <= 3; c++) sc(0, c, { border: {}, font: noteFont });
                    sc(0, 4, { font: noteFont, alignment: { horizontal: 'left', vertical: 'center', wrapText: true }, border: {} });

                    sc(1, 0, { font: headerFont, alignment: centerAlign, border: allBorders, fill: methodRowFill });

                    currentRow += FORM_ROWS + FORM_GAP;
                });

            };

            // 旧Excel出力（シンプル表形式を残す）
            const exportExcel = (targetRecords, fileName) => {
                if (targetRecords.length === 0) { alert('出力するデータがありません'); return; }
                const rows = targetRecords.map(rec => {

            // --- 月1達成度評価: 週評価データから自動抽出 ---
            const autoPopulateMonthly = () => {

            // --- 月1達成度評価: AI生成 ---
            const generateMonthlyContent = async (targetField) => {

            // --- 月1達成度評価: Excel出力（帳票様式） ---
            const createMonthlyFormSheet = (d, user) => {
                // スタイル定義（週評価と共通化）
                const thinBorder = { style: 'thin', color: { rgb: '000000' } };
                const allBorders = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
                const headerFont = { bold: true, sz: 10, name: 'ＭＳ Ｐゴシック' };
                const bodyFont = { sz: 10, name: 'ＭＳ Ｐゴシック' };
                const titleFont = { bold: true, sz: 18, name: 'ＭＳ Ｐゴシック' };
                const noteFont = { sz: 8, name: 'ＭＳ Ｐゴシック' };
                const centerAlign = { horizontal: 'center', vertical: 'center', wrapText: true };
                const leftAlign = { horizontal: 'left', vertical: 'center', wrapText: true };
                const topLeftAlign = { horizontal: 'left', vertical: 'top', wrapText: true };

                const methodMap = { commute: '通所', visit: '訪問', other: 'その他' };
                const methodStr = d.method === 'other' ? `${d.methodOther}` : (methodMap[d.method] || d.method);

                const CHARS_PER_LINE = 35;
                const calcRowHeight = (text) => {
                    if (!text) return BASE_ROW_HEIGHT * 3; // 空の場合は3行分の高さ確保（デフォルト）

                    let totalLines = 0;
                    lines.forEach(line => {
                        totalLines += Math.max(1, Math.ceil(line.length / CHARS_PER_LINE));
                    });
                    // 最低3行分は確保、それ以上なら行数×文字の高さ(約18pt)
                    return Math.max(BASE_ROW_HEIGHT * 3, totalLines * 18);

                    // 行8-10: 取組内容
                    ['取組内容', d.activities || '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    ['', '', '', '', '', '', '', '', ''],
                    // 行11-13: 達成度

                    (() => {

                    { s: { r: 17, c: 0 }, e: { r: 19, c: 0 } }, // 改善方針
                    { s: { r: 20, c: 0 }, e: { r: 21, c: 0 } }, // 健康面
                    { s: { r: 22, c: 0 }, e: { r: 23, c: 0 } }, // その他
                    { s: { r: 24, c: 0 }, e: { r: 25, c: 0 } }, // 妥当性
                    // 各項目の内容列（B-I列）の結合
                    { s: { r: 5, c: 1 }, e: { r: 7, c: 8 } }, // 訓練目標
                    { s: { r: 8, c: 1 }, e: { r: 10, c: 8 } }, // 取組内容
                    { s: { r: 11, c: 1 }, e: { r: 13, c: 8 } }, // 達成度
                    { s: { r: 14, c: 1 }, e: { r: 16, c: 8 } }, // 課題
                    { s: { r: 17, c: 1 }, e: { r: 19, c: 8 } }, // 改善方針
                    { s: { r: 20, c: 1 }, e: { r: 21, c: 8 } }, // 健康面
                    { s: { r: 22, c: 1 }, e: { r: 23, c: 8 } }, // その他
                    { s: { r: 24, c: 1 }, e: { r: 25, c: 8 } }, // 妥当性
                    // 評価実施者
                    { s: { r: 26, c: 1 }, e: { r: 26, c: 2 } }, // 名前 B-C
                    { s: { r: 26, c: 3 }, e: { r: 26, c: 4 } }, // 前回の達成度評価日ラベル D-E
                    // 確認文
                    { s: { r: 27, c: 0 }, e: { r: 27, c: 8 } },
                    // 対象者署名欄
                    { s: { r: 28, c: 3 }, e: { r: 28, c: 4 } }, // 対象者署名ラベル
                    { s: { r: 28, c: 5 }, e: { r: 28, c: 8 } }, // 署名記入欄
                ];

                // スタイル適用
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let r = range.s.r; r <= range.e.r; r++) {
                    for (let c = range.s.c; c <= range.e.c; c++) {
                        const addr = XLSX.utils.encode_cell({ r, c });
                        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
                        ws[addr].s = { font: bodyFont, border: allBorders, alignment: centerAlign };
                    }
                }

                // 個別スタイル上書き
                // タイトル
                const setStyle = (r, c, s) => { const addr = XLSX.utils.encode_cell({ r, c }); if (ws[addr]) ws[addr].s = { ...ws[addr].s, ...s }; };

                // タイトル行
                setStyle(0, 0, { font: titleFont, border: { bottom: thinBorder } });
                // 令和X年X月分 → 真ん中に配置
                setStyle(0, 6, { font: { sz: 11, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center' }, border: { bottom: thinBorder } });

                // 受給者証ラベル → 小さいフォント
                setStyle(1, 5, { font: { sz: 7, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: allBorders });
                // 受給者証番号 → 少し大きめのフォント
                setStyle(1, 6, { font: { sz: 10, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });

                // 実施時間 → 真ん中に配置
                setStyle(2, 5, { font: bodyFont, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });

                // ヘッダー項目
                [5, 8, 11, 14, 17, 20, 22, 24].forEach(r => {
                    setStyle(r, 0, { font: headerFont, alignment: centerAlign, fill: { fgColor: { rgb: "FFFFFF" } } });
                });

                // 左寄せ・縦中央にするセル（テキストが入る部分）
                [5, 8, 11, 14, 17, 20, 22, 24].forEach(r => {
                    setStyle(r, 1, { font: bodyFont, alignment: leftAlign, wrapText: true });
                });

                // チェックボックスのフォントサイズ調整
                for (let r = 3; r <= 4; r++) {
                    for (let c = 1; c <= 7; c += 2) {
                        const addr = XLSX.utils.encode_cell({ r, c });
                        if (ws[addr]) ws[addr].s = { ...ws[addr].s, font: { sz: 12, name: 'ＭＳ Ｐゴシック' }, alignment: centerAlign };
                    }
                }

                // 行26: 評価実施者行のスタイル
                setStyle(26, 0, { font: headerFont, alignment: centerAlign, border: allBorders });
                setStyle(26, 1, { font: bodyFont, alignment: centerAlign, border: allBorders });
                setStyle(26, 3, { font: { sz: 9, name: 'ＭＳ Ｐゴシック' }, alignment: centerAlign, border: allBorders });
                // 令和X年X月X日 の各セル
                for (let c = 5; c <= 8; c++) {
                    setStyle(26, c, { font: bodyFont, alignment: centerAlign, border: allBorders });
                }

                // 行27: 確認文（大きめのフォント、枠線付き）
                setStyle(27, 0, { font: { bold: true, sz: 12, name: 'ＭＳ Ｐゴシック' }, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });

                // 行28: 対象者署名欄
                for (let c = 0; c <= 2; c++) setStyle(28, c, { border: {} }); // A-Cは空白・枠なし
                setStyle(28, 3, { font: bodyFont, alignment: { horizontal: 'center', vertical: 'center' }, border: allBorders });
                setStyle(28, 5, { font: bodyFont, alignment: centerAlign, border: allBorders });

                return ws;
            };

                                                                        <button
                                                                            onClick={() => deleteMonthlyEval(evalData.id)}
                                                                            className="text-red-500 hover:underline text-sm"
                                                                        >
                                                                            削除
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                            <p className="text-xs text-gray-400 mt-3">※ 各行の「Excel」ボタンで個別ダウンロード、右上の「全件ダウンロード」で一括ダウンロードできます。</p>
                                        </div>
                                    );
                                })()}

                            </div>
                        )}


                    </main>
                </div>
            );
        };

        // サブコンポーネント: 利用者行（編集対応）
        const UserRow = ({ user, onSave, onDelete }) => {
            const [editing, setEditing] = useState(false);
            const [editName, setEditName] = useState(user.name);
            const [editFurigana, setEditFurigana] = useState(user.furigana || '');
            const [editNumber, setEditNumber] = useState(user.number || '');

            const handleSave = () => {
                if (!editName) { alert('氏名を入力してください'); return; }
                onSave({ ...user, name: editName, furigana: editFurigana, number: editNumber });
                setEditing(false);
            };

            const handleCancel = () => {
                setEditName(user.name);
                setEditFurigana(user.furigana || '');
                setEditNumber(user.number || '');
                setEditing(false);
            };

            if (editing) {
                return (
                    <div className="p-4 bg-blue-50 rounded border-2 border-blue-300 space-y-3">
                        <div className="flex gap-3 flex-wrap">
                            <div className="flex-1 min-w-[120px]">
                                <label className="block text-xs font-bold text-gray-500 mb-1">氏名</label>
                                <input className="input-field" value={editName} onChange={e => setEditName(e.target.value)} />
                            </div>
                            <div className="flex-1 min-w-[120px]">
                                <label className="block text-xs font-bold text-gray-500 mb-1">ふりがな</label>
                                <input className="input-field" value={editFurigana} onChange={e => setEditFurigana(e.target.value)} />
                            </div>
                            <div className="flex-1 min-w-[120px]">
                                <label className="block text-xs font-bold text-gray-500 mb-1">受給者証番号</label>
                                <input className="input-field" value={editNumber} onChange={e => setEditNumber(e.target.value)} />
                            </div>
                        </div>
                        <div className="flex gap-2 justify-end">
                            <button onClick={handleCancel} className="btn btn-ghost text-gray-500 text-sm">キャンセル</button>
                            <button onClick={handleSave} className="btn btn-primary text-sm px-4">保存</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-between items-center p-3 bg-white rounded border hover:shadow-sm transition">
                    <div>
                        <div className="font-bold text-lg">{user.name} {user.furigana && <span className="text-sm text-gray-400 ml-2">({user.furigana})</span>}</div>
                        <div className="text-sm text-gray-500">{user.number}</div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setEditing(true)} className="btn btn-ghost text-blue-500" title="編集">
                            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
                        </button>
                        <button onClick={onDelete} className="btn btn-ghost text-red-500" title="削除">
                            <Icons.Trash />
                        </button>
                    </div>
                </div>
            );
        };

        // サブコンポーネント: 利用者追加フォーム
        const AddUserForm = ({ onAdd }) => {
            const [name, setName] = useState('');
            const [furigana, setFurigana] = useState('');
            const [number, setNumber] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name) return;
                if (!furigana) { alert('ふりがなを入力してください'); return; }
                onAdd({ name, furigana, number });
                setName('');
                setFurigana('');
                setNumber('');
            };

            return (
                <form onSubmit={handleSubmit} className="flex gap-4 items-end flex-wrap">
                    <div className="flex-1 min-w-[140px]">
                        <label className="block text-sm font-bold text-gray-600 mb-1">氏名</label>
                        <input className="input-field" value={name} onChange={e => setName(e.target.value)} placeholder="例：山田 太郎" />
                    </div>
                    <div className="flex-1 min-w-[140px]">
                        <label className="block text-sm font-bold text-gray-600 mb-1">ふりがな</label>
                        <input className="input-field" value={furigana} onChange={e => setFurigana(e.target.value)} placeholder="例：やまだ たろう" />
                    </div>
                    <div className="flex-1 min-w-[140px]">
                        <label className="block text-sm font-bold text-gray-600 mb-1">受給者証番号</label>
                        <input className="input-field" value={number} onChange={e => setNumber(e.target.value)} placeholder="例：0000123456" />
                    </div>
                    <button type="submit" className="btn btn-primary h-11 px-6">追加</button>
                </form>
            );
        };

        // サブコンポーネント: 1ヶ月分帳票出力パネル
        const MonthlyExportPanel = ({ sortedUsers, onExport }) => {
            const now = new Date();
            const [expUserId, setExpUserId] = useState('');
            const [expYear, setExpYear] = useState(now.getFullYear());
            const [expMonth, setExpMonth] = useState(now.getMonth() + 1);

            return (
                <div className="glass p-6 rounded-xl border-l-4 border-green-500">
                    <h3 className="font-bold text-green-700 mb-4 flex items-center gap-2">
                        📋 1ヶ月分の帳票様式Excel出力
                    </h3>
                    <div className="flex gap-4 items-end flex-wrap">
                        <div className="flex-1 min-w-[160px]">
                            <label className="block text-sm font-bold text-gray-600 mb-1">利用者</label>
                            <select className="input-field" value={expUserId} onChange={e => setExpUserId(e.target.value)}>
                                <option value="">選択してください</option>
                                {sortedUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                            </select>
                        </div>
                        <div className="flex items-end gap-1">
                            <select className="input-field" value={expYear} onChange={e => setExpYear(Number(e.target.value))}>
                                {[2024, 2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}年</option>)}
                            </select>
                        </div>
                        <div className="flex items-end gap-1">
                            <select className="input-field" value={expMonth} onChange={e => setExpMonth(Number(e.target.value))}>
                                {[...Array(12)].map((_, i) => <option key={i + 1} value={i + 1}>{i + 1}月</option>)}
                            </select>
                        </div>
                        <button
                            onClick={() => { if (!expUserId) { alert('利用者を選択してください'); return; } onExport(expUserId, expYear, expMonth); }}
                            className="btn btn-primary h-11 px-6 shadow-lg transform hover:-translate-y-1"
                        >
                            <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                            帳票様式で出力
                        </button>
                    </div>
                    <p className="text-xs text-gray-400 mt-3">※ 選択した利用者・月に該当する週評価を帳票様式（画像と同じフォーマット）でExcel出力します。各週が別シートになります。</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
